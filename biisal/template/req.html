<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{ file_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Delius&display=swap" rel="stylesheet">
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <!-- hls.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Raleway', sans-serif;
            overflow-x: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .file-info {
            background: linear-gradient(90deg, rgba(26,26,46,0.9), rgba(46,46,86,0.9));
            padding: 15px;
            border-radius: 12px 12px 0 0;
            margin-bottom: -8px;
            overflow: hidden;
        }

        .file-name-marquee {
            font-family: 'Delius', cursive;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            animation: marquee 15s linear infinite;
            display: inline-block;
            padding-left: 100%;
        }

        @keyframes marquee {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .file-info:hover .file-name-marquee { animation-play-state: paused; }

        .player-wrapper {
            position: relative;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Video.js custom skin – dark & clean */
        .video-js {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 0 0 12px 12px;
        }
        .video-js .vjs-control-bar {
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
        }
        .video-js .vjs-big-play-button {
            display: none !important;   /* removed the big centre play icon */
        }

        /* Poster shown while loading */
        .vjs-poster {
            background-size: cover;
            background-position: center;
        }

        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        .loading.hidden { opacity: 0; pointer-events: none; }

        .spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            .file-name-marquee { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div></div>

    <div class="container">
        <div class="file-info">
            <div class="file-name-marquee">{{ file_name }}</div>
        </div>

        <div class="player-wrapper">
            <!-- Video element – Video.js will use this -->
            <video id="player" class="video-js vjs-default-skin" 
                   controls playsinline crossorigin="anonymous"
                   preload="auto"
                   {% if poster_url %}poster="{{ poster_url }}"{% endif %}
                   oncontextmenu="return false;">
            </video>
        </div>
    </div>

    <!-- Video.js library -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        // ---- Prevent context menu & selection ----
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());

        // ---- Prevent long-press context menu on mobile ----
        let longPressTimer;
        document.addEventListener('touchstart', e => { longPressTimer = setTimeout(() => e.preventDefault(), 500); });
        document.addEventListener('touchend',   () => clearTimeout(longPressTimer));
        document.addEventListener('touchmove',  () => clearTimeout(longPressTimer));

        // ---- Video source ----
        const videoSource = "{{ file_url }}";
        const isHLS = videoSource.includes('.m3u8');

        // ---- Get video element ----
        const videoElement = document.getElementById('player');

        // ---- Initialize Video.js ----
        const player = videojs('player', {
            controls: true,
            bigPlayButton: false,                 // removed as requested
            playbackRates: [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2],
            controlBar: {
                skipBackward: 10,                 // 10s rewind button
                skipForward: 10,                  // 10s forward button
                children: [
                    'playToggle',
                    'skipBackward',
                    'skipForward',
                    'progressControl',
                    'currentTimeDisplay',
                    'durationDisplay',
                    'playbackRateMenuButton',
                    'pictureInPictureToggle',
                    'fullscreenToggle'
                ]
            },
            fullscreen: {
                options: { iosNative: true }      // best iOS fullscreen
            },
            autoplay: false,
            muted: false,
            preload: 'auto'
        });

        // ---- Hide loading spinner ----
        function hideLoading() {
            setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
        }

        // ---- Handle HLS vs direct source (exactly as before) ----
        let errorRetryCount = 0;

        if (isHLS && Hls.isSupported()) {
            const hls = new Hls({
                enableWorker: true,
                backBufferLength: 90,
                maxBufferLength: 30,
                maxBufferSize: 60 * 1000 * 1000,
                manifestLoadingTimeOut: 10000,
                manifestLoadingMaxRetry: 3,
                fragLoadingTimeOut: 20000,
                fragLoadingMaxRetry: 6
            });
            hls.loadSource(videoSource);
            hls.attachMedia(videoElement);
            hls.on(Hls.Events.MANIFEST_PARSED, () => hideLoading());
            hls.on(Hls.Events.ERROR, (e, data) => {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR && errorRetryCount < 3) {
                        errorRetryCount++;
                        hls.startLoad();
                    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        hls.recoverMediaError();
                    } else {
                        hls.destroy();
                    }
                }
            });
            window.hls = hls;
        } else {
            videoElement.src = videoSource;
            videoElement.addEventListener('loadedmetadata', hideLoading);
        }

        // ---- Double‑tap seek (converted to Video.js API) ----
        let lastTapTime = 0, lastTapX = 0;
        videoElement.addEventListener('click', function(e) {
            const now = Date.now();
            if (now - lastTapTime < 300 && Math.abs(e.clientX - lastTapX) < 50) {
                const rect = videoElement.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const current = player.currentTime();
                if (x < rect.width / 3) {
                    player.currentTime(Math.max(0, current - 10));
                } else if (x > rect.width * 2 / 3) {
                    const dur = player.duration();
                    player.currentTime(Math.min(dur, current + 10));
                }
                lastTapTime = 0;
            } else {
                lastTapTime = now;
                lastTapX = e.clientX;
            }
        });

        let lastTouchTime = 0, lastTouchX = 0;
        videoElement.addEventListener('touchend', function(e) {
            const now = Date.now();
            const touch = e.changedTouches[0];
            if (now - lastTouchTime < 300 && Math.abs(touch.clientX - lastTouchX) < 50) {
                const rect = videoElement.getBoundingClientRect();
                const x = touch.clientX - rect.left;
                const current = player.currentTime();
                if (x < rect.width / 3) {
                    player.currentTime(Math.max(0, current - 10));
                } else if (x > rect.width * 2 / 3) {
                    const dur = player.duration();
                    player.currentTime(Math.min(dur, current + 10));
                }
                lastTouchTime = 0;
            } else {
                lastTouchTime = now;
                lastTouchX = touch.clientX;
            }
        });

        // ---- Error recovery ----
        player.on('error', function() {
            if (errorRetryCount < 3) {
                errorRetryCount++;
                setTimeout(() => {
                    videoElement.load();
                    player.play();
                }, 2000);
            }
        });

        // ---- Prevent keyboard shortcuts for saving ----
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) e.preventDefault();
        });

        // ---- Prevent drag ----
        videoElement.addEventListener('dragstart', e => e.preventDefault());
    </script>
</body>
</html>
