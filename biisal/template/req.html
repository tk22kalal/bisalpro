<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{ file_name }}</title>
    
    <!-- Vidstack Library (Modern Web Components) -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video-minimal-ui.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Delius&display=swap" rel="stylesheet">

    <style>
        /* Your Custom Page Layout */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            position: relative;
        }

        /* File Name Marquee */
        .file-header {
            position: absolute;
            top: -40px;
            left: 0;
            width: 100%;
            z-index: 10;
        }

        .marquee-text {
            font-family: 'Delius', cursive;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            white-space: nowrap;
            overflow: hidden;
        }

        /* --- INTEGRATED TEMPLATE CSS --- */
        video-player {
            display: block;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            background: #000;
        }

        /* Center Play/Pause Bubble Fix */
        .media-input-feedback {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 2;
        }

        /* Modern Floating Pill Adjustment */
        .media-minimal-skin--video .media-controls {
            background-color: rgba(20, 20, 20, 0.7) !important;
            backdrop-filter: blur(12px) saturate(1.5);
            -webkit-backdrop-filter: blur(12px) saturate(1.5);
            border: 1px solid rgba(255,255,255,0.1);
            bottom: 20px !important;
            inset-inline: 20px !important;
            width: auto !important;
            height: 60px !important;
            border-radius: 30px !important;
        }

        /* Center Play button feedback icon */
        .media-input-feedback-bubble .media-icon {
            width: 64px;
            height: 64px;
            color: white;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            padding: 10px;
        }

        /* PASTE OF YOUR PROVIDED TEXT/PLAIN CSS (Optimized for this layout) */
        /* (The following is the logic from your provided CSS block) */
        
        .media-minimal-skin {
            --media-icon-size: 20px;
            --media-current-shadow-color: rgba(0,0,0,0.5);
            position: relative;
            display: block;
            width: 100%;
            height: 100%;
        }

        .media-button {
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .media-button:active { transform: scale(0.9); }

        .media-slider__track {
            background: rgba(255,255,255,0.2) !important;
        }
        .media-slider__fill {
            background: #fff !important;
        }
        .media-slider__thumb {
            background: #fff !important;
            width: 12px !important;
            height: 12px !important;
        }

        /* Settings Menu Styling */
        .media-menu {
            background: rgba(25, 25, 25, 0.95) !important;
            backdrop-filter: blur(15px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Hide default loading to show your clean look */
        .media-buffering-indicator[data-visible] {
            display: grid;
            place-content: center;
        }

        @media (max-width: 768px) {
            .media-minimal-skin--video .media-controls {
                bottom: 10px !important;
                inset-inline: 10px !important;
                height: 50px !important;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="file-header">
            <div class="marquee-text">{{ file_name }}</div>
        </div>

        <!-- NEW VIDSTACK PLAYER TEMPLATE -->
        <video-player>
            <media-container class="media-minimal-skin media-minimal-skin--video">
                <!-- Source is now dynamically injected via Jinja -->
                <video src="{{ file_url }}" playsinline preload="auto" crossorigin="anonymous"></video>

                <!-- Loading State -->
                <media-buffering-indicator class="media-buffering-indicator">
                    <media-icon name="spinner" family="minimal" class="media-icon"></media-icon>
                </media-buffering-indicator>

                <!-- Floating Controls Pill -->
                <media-controls class="media-controls">
                    <media-tooltip-group>
                        <!-- Play / Rewind / Fast Forward -->
                        <div class="media-button-group">
                            <media-play-button class="media-button media-button--subtle media-button--icon media-button--play">
                                <media-icon name="restart" family="minimal" class="media-icon media-icon--restart"></media-icon>
                                <media-icon name="play" family="minimal" class="media-icon media-icon--play"></media-icon>
                                <media-icon name="pause" family="minimal" class="media-icon media-icon--pause"></media-icon>
                            </media-play-button>

                            <media-seek-button seconds="-10" class="media-button media-button--subtle media-button--icon media-button--seek">
                                <span class="media-icon__container">
                                    <media-icon name="seek" family="minimal" class="media-icon media-icon--flipped"></media-icon>
                                    <span class="media-icon__label">10</span>
                                </span>
                            </media-seek-button>

                            <media-seek-button seconds="10" class="media-button media-button--subtle media-button--icon media-button--seek">
                                <span class="media-icon__container">
                                    <media-icon name="seek" family="minimal" class="media-icon"></media-icon>
                                    <span class="media-icon__label">10</span>
                                </span>
                            </media-seek-button>
                        </div>

                        <!-- Progress Bar & Time -->
                        <div class="media-time-controls">
                            <media-time-group class="media-time-group">
                                <media-time type="current" class="media-time media-time--current"></media-time>
                                <media-time-separator class="media-time-separator"></media-time-separator>
                                <media-time type="duration" class="media-time media-time--duration"></media-time>
                            </media-time-group>

                            <media-time-slider class="media-slider">
                                <media-slider-track class="media-slider__track">
                                    <media-slider-fill class="media-slider__fill"></media-slider-fill>
                                    <media-slider-buffer class="media-slider__buffer"></media-slider-buffer>
                                </media-slider-track>
                                <media-slider-thumb class="media-slider__thumb"></media-slider-thumb>
                            </media-time-slider>
                        </div>

                        <!-- Right Actions -->
                        <div class="media-button-group">
                            <media-mute-button class="media-button media-button--subtle media-button--icon media-button--mute">
                                <media-icon name="volume-off" family="minimal" class="media-icon media-icon--volume-off"></media-icon>
                                <media-icon name="volume-low" family="minimal" class="media-icon media-icon--volume-low"></media-icon>
                                <media-icon name="volume-high" family="minimal" class="media-icon media-icon--volume-high"></media-icon>
                            </media-mute-button>

                            <!-- Settings Menu -->
                            <button commandfor="settings-menu" class="media-button media-button--subtle media-button--icon">
                                <media-icon name="gear" family="minimal"></media-icon>
                            </button>
                            
                            <media-menu id="settings-menu" side="top" align="end" class="media-menu">
                                <media-menu-view>
                                    <!-- Playback Speed -->
                                    <media-menu-item commandfor="speed-menu" class="media-menu__item">
                                        <span>Speed</span>
                                        <media-menu-item-value></media-menu-item-value>
                                    </media-menu-item>
                                </media-menu-view>
                                
                                <media-menu id="speed-menu">
                                    <media-playback-rate-radio-group>
                                        <template>
                                            <media-menu-radio-item class="media-menu__item">
                                                <span data-part="label"></span>
                                            </media-menu-radio-item>
                                        </template>
                                    </media-playback-rate-radio-group>
                                </media-menu>
                            </media-menu>

                            <media-fullscreen-button class="media-button media-button--subtle media-button--icon">
                                <media-icon name="fullscreen-enter" family="minimal" class="media-icon--fullscreen-enter"></media-icon>
                                <media-icon name="fullscreen-exit" family="minimal" class="media-icon--fullscreen-exit"></media-icon>
                            </media-fullscreen-button>
                        </div>
                    </media-tooltip-group>
                </media-controls>

                <!-- FEEDBACK ICONS (Play/Pause/Seek Center Icons) -->
                <div class="media-input-feedback">
                    <media-status-indicator actions="togglePaused" class="media-input-feedback-bubble">
                        <media-icon name="play" family="minimal" class="media-icon media-icon--play"></media-icon>
                        <media-icon name="pause" family="minimal" class="media-icon media-icon--pause"></media-icon>
                    </media-status-indicator>

                    <media-seek-indicator class="media-input-feedback-bubble">
                        <media-icon name="chevron" family="minimal" class="media-icon media-icon--seek"></media-icon>
                    </media-seek-indicator>
                </div>

                <!-- Hotkeys & Gestures -->
                <media-hotkey keys="Space" action="togglePaused"></media-hotkey>
                <media-gesture type="tap" action="togglePaused" region="center"></media-gesture>
                <media-gesture type="doubletap" action="seekStep" value="-10" region="left"></media-gesture>
                <media-gesture type="doubletap" action="seekStep" value="10" region="right"></media-gesture>

            </media-container>
        </video-player>
    </div>

    <script>
        // Disable Context Menu
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
