<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{ file_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { margin: 0; background: #0a0a0a; font-family: 'Raleway', sans-serif; color: #fff; overflow: hidden; user-select: none; -webkit-user-select: none; }
        .header-title { background: #1a1a2e; padding: 12px; overflow: hidden; white-space: nowrap; border-bottom: 1px solid #333; }
        .marquee { display: inline-block; animation: scroll 15s linear infinite; font-weight: bold; }
        @keyframes scroll { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }
        .player-container { width: 100vw; height: calc(100vh - 50px); display: flex; align-items: center; background: #000; }
        #player { width: 100%; }
        /* Hide download buttons in plyr */
        .plyr__control[data-plyr="download"] { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="header-title"><div class="marquee">{{ file_name }}</div></div>
    <div class="player-container">
        <video id="player" playsinline webkit-playsinline controls crossorigin="anonymous"></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        const video = document.getElementById('player');
        const source = "{{ file_url }}";
        
        // Security: Block common Inspect Element shortcuts
        document.onkeydown = (e) => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };

        const player = new Plyr(video, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'fullscreen'],
            settings: ['quality', 'speed']
        });

        if (Hls.isSupported()) {
            const hls = new Hls({ maxBufferLength: 20, maxMaxBufferLength: 40 });
            hls.loadSource(source);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = source; // For Safari/iOS Native
        }
    </script>
</body>
</html>
