<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{ file_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Delius&display=swap" rel="stylesheet">
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Raleway', sans-serif;
            overflow-x: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .file-info {
            background: linear-gradient(90deg, rgba(26,26,46,0.9), rgba(46,46,86,0.9));
            padding: 15px;
            border-radius: 12px 12px 0 0;
            margin-bottom: -8px;
            overflow: hidden;
            z-index: 2;
        }

        .file-name-marquee {
            font-family: 'Delius', cursive;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            animation: marquee 15s linear infinite;
            display: inline-block;
            padding-left: 100%;
        }

        @keyframes marquee {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .file-info:hover .file-name-marquee { animation-play-state: paused; }

        .player-wrapper {
            position: relative;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            background: #000;
        }

        /* Video.js Custom Styling */
        .video-js {
            width: 100%;
            aspect-ratio: 16 / 9;
            font-family: 'Raleway', sans-serif;
        }

        /* Hide big middle play button as requested */
        .vjs-big-play-button {
            display: none !important;
        }

        /* Customize control bar */
        .vjs-control-bar {
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%) !important;
            height: 3.5em !important;
        }

        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        .loading.hidden { opacity: 0; pointer-events: none; }

        .spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            .file-name-marquee { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div></div>

    <div class="container">
        <div class="file-info">
            <div class="file-name-marquee">{{ file_name }}</div>
        </div>

        <div class="player-wrapper">
            <video 
                id="player" 
                class="video-js vjs-default-skin vjs-big-play-centered" 
                controls 
                preload="auto" 
                playsinline
                oncontextmenu="return false;">
                <source src="{{ file_url }}" type="application/x-mpegURL">
            </video>
        </div>
    </div>

    <!-- Video.js Script -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        // Disable Right Click and Selection
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());

        // Initialize Video.js
        const player = videojs('player', {
            playbackRates: [0.5, 1, 1.25, 1.5, 2],
            fluid: true,
            responsive: true,
            controlBar: {
                children: [
                    'playToggle',
                    'volumePanel',
                    'currentTimeDisplay',
                    'timeDivider',
                    'durationDisplay',
                    'progressControl',
                    'playbackRateMenuButton',
                    'subsCapsButton',
                    'qualitySelector',
                    'fullscreenToggle',
                ],
            },
        });

        const videoElement = document.getElementById('player_html5_api');
        const loadingScreen = document.getElementById('loading');

        function hideLoading() {
            setTimeout(() => loadingScreen.classList.add('hidden'), 500);
        }

        // Hide loader when video is ready
        player.on('canplay', hideLoading);

        // Error Handling
        let errorRetryCount = 0;
        player.on('error', () => {
            if (errorRetryCount < 3) {
                errorRetryCount++;
                setTimeout(() => {
                    player.src({ src: "{{ file_url }}", type: 'application/x-mpegURL' });
                    player.load();
                    player.play();
                }, 2000);
            }
        });

        // Double Click / Double Tap Skip Logic
        let lastTapTime = 0;
        let lastTapX = 0;

        const handleDoubleTap = (clientX) => {
            const now = Date.now();
            const rect = player.el().getBoundingClientRect();
            const x = clientX - rect.left;

            if (now - lastTapTime < 300 && Math.abs(clientX - lastTapX) < 50) {
                // Determine Left or Right side
                if (x < rect.width / 3) {
                    // Skip backward
                    player.currentTime(Math.max(0, player.currentTime() - 10));
                } else if (x > (rect.width * 2) / 3) {
                    // Skip forward
                    player.currentTime(Math.min(player.duration(), player.currentTime() + 10));
                }
                lastTapTime = 0; // Reset
            } else {
                lastTapTime = now;
                lastTapX = clientX;
            }
        };

        // Desktop Double Click
        player.on('click', (e) => {
            handleDoubleTap(e.clientX);
        });

        // Mobile Double Tap
        player.on('touchend', (e) => {
            handleDoubleTap(e.changedTouches[0].clientX);
        });

        // Prevention for save-as
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) e.preventDefault();
        });

        // Auto-hide loading if video takes too long to trigger 'canplay'
        setTimeout(() => {
            if (!loadingScreen.classList.contains('hidden')) hideLoading();
        }, 5000);
    </script>
</body>
</html>
