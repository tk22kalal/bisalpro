<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{ file_name }}</title>
    
    <!-- Video.js Base CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Delius&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --vjs-theme-color: #ffffff;
            --control-bg: rgba(20, 20, 20, 0.6);
            --blur-effect: blur(12px);
            --border-radius: 24px;
        }

        body {
            margin: 0;
            padding: 0;
            background: #050505;
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            position: relative;
        }

        /* File Name Styling */
        .header-info {
            position: absolute;
            top: -40px;
            left: 10px;
            width: 100%;
            z-index: 10;
        }
        .marquee-text {
            font-family: 'Delius', cursive;
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            white-space: nowrap;
        }

        /* Video Wrapper */
        .player-card {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #000;
        }

        /* --- VIDEO.JS CUSTOM THEME --- */
        .video-js {
            font-family: 'Inter', sans-serif;
            background-color: #000;
        }

        /* Floating Pill Control Bar */
        .video-js .vjs-control-bar {
            display: flex;
            width: 92% !important;
            height: 64px !important;
            bottom: 20px !important;
            left: 4% !important;
            right: 4% !important;
            border-radius: var(--border-radius) !important;
            background-color: var(--control-bg) !important;
            backdrop-filter: var(--blur-effect);
            -webkit-backdrop-filter: var(--blur-effect);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0 15px;
            align-items: center;
        }

        /* Custom Play Button in Center */
        .vjs-big-play-button {
            width: 80px !important;
            height: 80px !important;
            line-height: 80px !important;
            border-radius: 50% !important;
            background: rgba(255,255,255,0.15) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2) !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            transition: all 0.3s ease !important;
        }
        .video-js:hover .vjs-big-play-button {
            background: rgba(255,255,255,0.25) !important;
            transform: translate(-50%, -50%) scale(1.1) !important;
        }

        /* Seek Bar (Progress) */
        .vjs-progress-control {
            position: absolute !important;
            width: 100% !important;
            height: 6px !important;
            top: -12px !important;
            left: 0 !important;
        }
        .vjs-progress-holder {
            margin: 0 !important;
            height: 100% !important;
            border-radius: 10px !important;
        }
        .vjs-play-progress {
            background: #fff !important; /* Pure white bar like images */
            border-radius: 10px !important;
        }
        .vjs-play-progress:before {
            font-size: 14px !important;
            top: -4px !important;
        }

        /* Icons Styling */
        .vjs-button > .vjs-icon-placeholder:before {
            font-size: 24px !important;
            line-height: 64px !important;
        }

        /* Time Display */
        .vjs-current-time, .vjs-duration {
            display: block !important;
            font-weight: 600;
            font-size: 14px;
        }

        /* Custom Skip Icons */
        .skip-icon {
            cursor: pointer;
            padding: 0 10px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
        }
        .skip-icon:hover { opacity: 1; }

        /* Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .video-js .vjs-control-bar {
                height: 55px !important;
                bottom: 10px !important;
            }
            .vjs-current-time, .vjs-duration, .vjs-volume-panel { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="container">
        <div class="header-info">
            <div class="marquee-text">{{ file_name }}</div>
        </div>

        <div class="player-card">
            <video 
                id="my-video" 
                class="video-js vjs-big-play-centered" 
                playsinline 
                preload="auto">
            </video>
        </div>
    </div>

    <!-- Video.js Library -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        const videoSrc = "{{ file_url }}";
        const isHLS = videoSrc.includes('.m3u8');

        // Initialize Player
        const player = videojs('my-video', {
            controls: true,
            fluid: true,
            playbackRates: [0.5, 1, 1.5, 2],
            controlBar: {
                children: [
                    'playToggle',
                    'currentTimeDisplay',
                    'progressControl',
                    'durationDisplay',
                    'volumePanel',
                    'playbackRateMenuButton',
                    'fullscreenToggle',
                ]
            }
        });

        // Set Source
        player.src({
            src: videoSrc,
            type: isHLS ? 'application/x-mpegURL' : 'video/mp4'
        });

        // Add Custom Skip Buttons (Rewind & Forward 10s)
        const createSkipButton = (direction) => {
            const btn = document.createElement('div');
            btn.className = `vjs-control skip-icon`;
            btn.innerHTML = direction === 'back' ? 
                `<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12.5 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.31 2.69-6 6-6s6 2.69 6 6-2.69 6-6 6c-1.66 0-3.17-.67-4.24-1.76l-1.42 1.42C8.13 19.42 9.96 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-2.42 12V9.38h-.12l-1.21.87V11.4l1.21-.85h.12V15h1zm4.92-3c0-1.66-.36-3-1.42-3-1.06 0-1.42 1.34-1.42 3s.36 3 1.42 3c1.06 0 1.42-1.34 1.42-3zm-1.42 2.11c-.48 0-.58-.83-.58-2.11s.1-2.11.58-2.11.58.83.58 2.11-.1 2.11-.58 2.11z"/></svg>` :
                `<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M11.5 3c4.97 0 9 4.03 9 9H23l-3.89 3.89-.07.14L15 12h3c0-3.31-2.69-6-6-6s-6 2.69-6 6 2.69 6 6 6c1.66 0 3.17-.67 4.24-1.76l1.42 1.42C15.87 19.42 14.04 20 12 20c-4.97 0-9-4.03-9-9s4.03-9 9-9zm-2.42 12V9.38h-.12l-1.21.87V11.4l1.21-.85h.12V15h1zm4.92-3c0-1.66-.36-3-1.42-3-1.06 0-1.42 1.34-1.42 3s.36 3 1.42 3c1.06 0 1.42-1.34 1.42-3zm-1.42 2.11c-.48 0-.58-.83-.58-2.11s.1-2.11.58-2.11.58.83.58 2.11-.1 2.11-.58 2.11z"/></svg>`;
            
            btn.onclick = () => {
                const time = player.currentTime();
                player.currentTime(direction === 'back' ? time - 10 : time + 10);
            };
            return btn;
        };

        player.ready(() => {
            const controlBar = player.controlBar.el();
            const playToggle = player.controlBar.playToggle.el();
            // Insert Skip Back after Play button, Skip Forward after that
            controlBar.insertBefore(createSkipButton('back'), playToggle.nextSibling);
            controlBar.insertBefore(createSkipButton('forward'), playToggle.nextSibling.nextSibling);
            
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        });

        // Double Tap Skip Logic
        let lastTap = 0;
        player.on('touchend', (e) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                const rect = player.el().getBoundingClientRect();
                const x = e.changedTouches[0].clientX - rect.left;
                if (x < rect.width / 2) player.currentTime(player.currentTime() - 10);
                else player.currentTime(player.currentTime() + 10);
            }
            lastTap = now;
        });

        // Disable Right Click
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
