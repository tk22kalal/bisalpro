<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }}</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Delius">
    <!-- ORIGINAL Video.js 8.10.0 CSS (keep exactly) -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            font-family: 'Raleway', sans-serif;
            overflow-x: hidden;
        }

        marquee {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: rgba(0,0,0,0.9);
            padding: 10px;
            font-family: 'Delius', serif;
            width: 100%;
            z-index: 999;
        }

        .container {
            width: 100%;
            background: #000;
            position: relative;
        }

        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16 / 9;
        }

        audio.video-js { height: 80px !important; }

        .vjs-tech { object-fit: contain; }

        /* ❌ Removed .tap-indicator and @keyframes tapFade completely */

        .vjs-control-bar { background: linear-gradient(transparent, rgba(0,0,0,0.85)) !important; }

        .vjs-big-play-button {
            border-radius: 50% !important;
            width: 2em !important; height: 2em !important;
            line-height: 2em !important;
            border: 0.06666em solid #fff !important;
            background-color: rgba(43,51,63,0.7) !important;
            left: 50% !important; top: 50% !important;
            transform: translate(-50%, -50%) !important;
        }

        .vjs-menu-button-popup .vjs-menu { left: auto !important; right: 0 !important; }
        .vjs-menu-button-popup .vjs-menu .vjs-menu-content { background-color: rgba(0,0,0,0.9) !important; max-height: 20em !important; }
        .vjs-menu li.vjs-selected { background-color: rgba(255,255,255,0.2) !important; }
        .vjs-playback-rate .vjs-playback-rate-value { font-size: 1.5em; line-height: 2; }
        a[download] { display: none !important; }
        .vjs-control[download] { display: none !important; }

        @media (max-width: 768px) {
            marquee { font-size: 14px; padding: 8px; }
        }
    </style>
</head>
<body>
    <header>
        <marquee bgcolor="rgba(0,0,0,0.9)">
            <div id="file-name">{{ file_name }}</div>
        </marquee>
    </header>

    <div class="container">
        <{{ tag }}
            id="player"
            class="video-js vjs-default-skin vjs-big-play-centered"
            controls
            preload="auto"
            playsinline
            controlsList="nodownload"
            oncontextmenu="return false;"
            crossorigin="anonymous">
            <source src="{{ file_url }}" type="application/x-mpegURL">
        </{{ tag }}>
    </div>

    <!-- ORIGINAL Video.js 8.10.0 JS -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@videojs/http-streaming@3.12.0/dist/videojs-http-streaming.min.js"></script>
    <script>
    (function() {
        'use strict';

        const playerElement = document.getElementById('player');
        const source = '{{ file_url }}';

        const player = videojs('player', {
            controls: true,
            autoplay: false,
            preload: 'auto',
            fluid: false,
            playbackRates: [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2],
            controlBar: {
                children: [
                    'playToggle',
                    'currentTimeDisplay',
                    'timeDivider',
                    'durationDisplay',
                    'progressControl',
                    'volumePanel',
                    'playbackRateMenuButton',   // ← no qualityButton
                    'pictureInPictureToggle',
                    'fullscreenToggle'
                ]
            },
            html5: {
                vhs: {
                    overrideNative: true,
                    enableLowInitialPlaylist: true,
                    smoothQualityChange: true,
                    useBandwidthFromLocalStorage: true,
                    bandwidth: 4194304,
                    handleManifestRedirects: true,
                    limitRenditionByPlayerDimensions: false,
                    useDevicePixelRatio: true
                },
                nativeVideoTracks: false,
                nativeAudioTracks: false,
                nativeTextTracks: false
            }
        });

        // disable right‑click / download
        player.ready(function() {
            playerElement.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
        });

        // auto‑reload on error
        player.on('error', function() {
            var err = player.error();
            if (err && err.code === 4) {
                setTimeout(function() {
                    player.src({ src: source, type: 'application/x-mpegURL' });
                    player.load();
                }, 3000);
            }
        });

        // cleanup on leave
        window.addEventListener('beforeunload', function() {
            if (player) player.dispose();
        });

        // hide native download button
        var style = document.createElement('style');
        style.textContent = `
            .video-js *[download] { display: none !important; }
            video::-webkit-media-controls-download-button { display: none !important; }
            video::-webkit-media-controls-enclosure { overflow: hidden !important; }
            video::-internal-media-controls-download-button { display: none !important; }
        `;
        document.head.appendChild(style);
    })();
    </script>
</body>
</html>
