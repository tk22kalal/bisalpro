<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }}</title>

    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,700">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            font-family: 'Roboto', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Marquee Header */
        marquee {
            font-size: 16px;
            font-weight: 400;
            color: #fff;
            padding: 15px;
            width: 100%;
            position: absolute;
            top: 0;
            z-index: 10;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-wrapper {
            width: 100%;
            position: relative;
        }

        /* ----- THE BIG CENTER PLAY BUTTON ----- */
        .vjs-big-play-button {
            background-color: #e3e3e3 !important; /* Off-white circle */
            border: none !important;
            border-radius: 50% !important;
            width: 80px !important;
            height: 80px !important;
            line-height: 80px !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5) !important;
        }

        /* The black triangle icon */
        .vjs-big-play-button .vjs-icon-placeholder:before {
            color: #000 !important;
            font-size: 40px !important;
            content: "\f101" !important; /* Video.js play icon */
        }

        /* ----- CONTROL BAR LAYOUT ----- */
        .vjs-control-bar {
            background: linear-gradient(transparent, rgba(0,0,0,0.7)) !important;
            display: flex !important;
            flex-wrap: wrap !important;
            height: 80px !important; /* Taller to fit two rows */
            align-items: center !important;
            padding: 0 10px !important;
        }

        /* Row 1: Time on left, Buttons on right */
        .vjs-current-time { 
            display: block !important; 
            order: 1;
            font-size: 16px !important;
        }
        .vjs-time-divider, .vjs-duration, .vjs-remaining-time-display { display: none !important; }

        /* Push remaining icons to the right */
        .vjs-volume-panel { order: 2; margin-left: auto !important; }
        .vjs-fullscreen-control { order: 3; }
        .vjs-playback-rate { order: 4; } /* Acting as our 'menu' placeholder */

        /* Row 2: Progress Bar at the very bottom */
        .vjs-progress-control {
            order: 5;
            width: 100% !important;
            height: 30px !important;
            position: relative;
        }

        /* ----- PROGRESS BAR STYLING ----- */
        .video-js .vjs-progress-holder {
            height: 4px !important;
            margin: 0 !important;
            background-color: rgba(255,255,255,0.3) !important;
        }

        /* The filled part of the bar (White) */
        .video-js .vjs-play-progress {
            background-color: #fff !important;
        }

        /* The Circle Scrubber (Thumb) */
        .video-js .vjs-play-progress:before {
            font-size: 18px !important;
            color: #fff !important;
            top: -7px !important;
            content: "●" !important;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Icon Styling */
        .vjs-button > .vjs-icon-placeholder:before {
            font-size: 22px !important;
            line-height: 1.8 !important;
        }

        /* Hide unnecessary clutter */
        .vjs-picture-in-picture-control { display: none !important; }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .vjs-big-play-button { width: 60px !important; height: 60px !important; line-height: 60px !important; }
            .vjs-big-play-button .vjs-icon-placeholder:before { font-size: 30px !important; }
        }
    </style>
</head>
<body>

    <marquee scrollamount="5">{{ file_name }}</marquee>

    <div class="container">
        <div class="video-wrapper" id="player-container">
            <video
                id="main-player"
                class="video-js vjs-fluid"
                controls
                preload="auto"
                playsinline
                oncontextmenu="return false;">
                <source src="{{ file_url }}" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- Video.js Core Script -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        const player = videojs('main-player', {
            controlBar: {
                children: [
                    'currentTimeDisplay',
                    'volumePanel',
                    'fullscreenToggle',
                    'playbackRateMenuButton', // Used as the 'three dots' menu substitute
                    'progressControl'
                ]
            }
        });

        // Double tap to seek logic
        const container = document.getElementById('player-container');
        let lastTap = 0;
        container.addEventListener('touchstart', function(e) {
            const now = Date.now();
            if (now - lastTap < 300) {
                const rect = container.getBoundingClientRect();
                const touchX = e.touches[0].clientX - rect.left;
                if (touchX < rect.width / 2) {
                    player.currentTime(player.currentTime() - 10);
                } else {
                    player.currentTime(player.currentTime() + 10);
                }
                e.preventDefault();
            }
            lastTap = now;
        });

        // Handle auto-retry on error
        player.on('error', function() {
            setTimeout(() => { player.load(); player.play(); }, 3000);
        });
    </script>
</body>
</html>
