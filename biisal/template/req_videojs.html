<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }}</title>

    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,700">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            font-family: 'Roboto', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Marquee – static bar above the video */
        marquee {
            font-size: 16px;
            font-weight: 400;
            color: #fff;
            padding: 10px 15px;
            width: 100%;
            flex-shrink: 0;
            background: #000;
        }

        .container {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .video-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Video player */
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        /* ----- THE BIG CENTER PLAY BUTTON (off‑white circle) ----- */
        .vjs-big-play-button {
            background-color: #e3e3e3 !important;
            border: none !important;
            border-radius: 50% !important;
            width: 100px !important;
            height: 100px !important;
            line-height: 100px !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6) !important;
            z-index: 10 !important;
        }

        /* Black triangle icon */
        .vjs-big-play-button .vjs-icon-placeholder:before {
            color: #000 !important;
            font-size: 45px !important;
            content: "\f101" !important;
        }

        /* ----- CONTROL BAR (bottom of video) ----- */
        .vjs-control-bar {
            background: linear-gradient(transparent, rgba(0,0,0,0.8)) !important;
            display: flex !important;
            flex-direction: column !important;
            height: auto !important;
            align-items: stretch !important;
            padding: 0 !important;
            position: absolute !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            z-index: 20 !important;
        }

        /* Progress bar row (full width) */
        .vjs-progress-control {
            order: 1;
            width: 100% !important;
            height: 30px !important;
            display: flex !important;
            align-items: center !important;
            padding: 5px 10px !important;
            box-sizing: border-box !important;
        }

        /* ----- PROGRESS BAR STYLING (white) ----- */
        .video-js .vjs-progress-holder {
            height: 6px !important;
            margin: 0 !important;
            background-color: rgba(255,255,255,0.3) !important;
            flex: 1;
            position: relative;
        }

        .video-js .vjs-play-progress {
            background-color: #fff !important;
            height: 6px !important;
        }

        /* Circle scrubber */
        .video-js .vjs-play-progress:before {
            font-size: 16px !important;
            color: #fff !important;
            top: -5px !important;
            content: "●" !important;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Control buttons row */
        .vjs-control-bar > div:not(.vjs-progress-control) {
            display: flex !important;
            flex-wrap: wrap !important;
            height: 40px !important;
            align-items: center !important;
            padding: 0 10px !important;
            order: 2;
        }

        /* Time display */
        .vjs-current-time {
            display: block !important;
            font-size: 14px !important;
            margin-right: 15px !important;
            min-width: 50px !important;
        }

        .vjs-time-divider, .vjs-duration, .vjs-remaining-time-display { display: none !important; }

        /* Button spacing */
        .vjs-volume-panel {
            margin-left: auto !important;
            display: flex !important;
            align-items: center !important;
        }

        .vjs-fullscreen-control {
            display: flex !important;
            align-items: center !important;
            margin-left: 10px !important;
        }

        .vjs-playback-rate {
            display: flex !important;
            align-items: center !important;
            margin-left: 10px !important;
        }

        /* Icons */
        .vjs-button > .vjs-icon-placeholder:before {
            font-size: 22px !important;
            line-height: 1.8 !important;
        }

        .vjs-picture-in-picture-control { display: none !important; }

        /* Hide play button in control bar */
        .vjs-play-control { display: none !important; }

        /* Mobile */
        @media (max-width: 768px) {
            .vjs-big-play-button {
                width: 80px !important;
                height: 80px !important;
                line-height: 80px !important;
            }
            .vjs-big-play-button .vjs-icon-placeholder:before {
                font-size: 36px !important;
            }
            .vjs-current-time {
                font-size: 12px !important;
            }
        }
    </style>
</head>
<body>

    <!-- Marquee above the video -->
    <marquee scrollamount="5">{{ file_name }}</marquee>

    <div class="container">
        <div class="video-wrapper" id="player-container">
            <video
                id="main-player"
                class="video-js vjs-fluid"
                controls
                preload="auto"
                playsinline
                oncontextmenu="return false;">
                <source src="{{ file_url }}" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- Video.js Core Script -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        const player = videojs('main-player', {
            controlBar: {
                children: [
                    'progressControl',
                    'currentTimeDisplay',
                    'volumePanel',
                    'playbackRateMenuButton',
                    'fullscreenToggle'
                ]
            }
        });

        // --- Tap the middle of the video to toggle play/pause ---
        player.on('click', function(e) {
            // Ignore clicks on the control bar and the big button
            if (e.target.closest('.vjs-control-bar') || e.target.closest('.vjs-big-play-button')) {
                return;
            }
            if (player.paused()) {
                player.play();
            } else {
                player.pause();
            }
        });

        // --- Double tap to seek ---
        const container = document.getElementById('player-container');
        let lastTap = 0;
        container.addEventListener('touchstart', function(e) {
            const now = Date.now();
            if (now - lastTap < 300) {
                const rect = container.getBoundingClientRect();
                const touchX = e.touches[0].clientX - rect.left;
                if (touchX < rect.width / 2) {
                    player.currentTime(player.currentTime() - 10);
                } else {
                    player.currentTime(player.currentTime() + 10);
                }
                e.preventDefault();
            }
            lastTap = now;
        });

        // --- Error recovery ---
        player.on('error', function() {
            setTimeout(() => { player.load(); player.play(); }, 3000);
        });
    </script>
</body>
</html>
