<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }}</title>

    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway:400,700">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Delius">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            font-family: 'Raleway', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Marquee – same clean look as Code 2 */
        marquee {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: rgba(0,0,0,0.9);
            padding: 10px;
            font-family: 'Delius', serif;
            width: 100%;
            z-index: 999;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Player Wrapper */
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
        }

        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16 / 9;
        }

        /* ---------- Big Play Button (blank white transparent circle) ---------- */
        .vjs-big-play-button {
            background-color: rgba(255, 255, 255, 0.45) !important;  /* white semi-transparent */
            border: none !important;                                    /* no border */
            border-radius: 50% !important;
            width: 2.5em !important;
            height: 2.5em !important;
            line-height: 2.5em !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) !important;
            margin: 0 !important;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        /* Remove the play triangle icon → blank circle */
        .vjs-big-play-button .vjs-icon-placeholder:before {
            content: none !important;
        }

        /* ---------- Control Bar (Code 2 style, no playToggle) ---------- */
        .vjs-control-bar {
            background: linear-gradient(transparent, rgba(0,0,0,0.85)) !important;
        }

        /* Make all control bar icons and text white */
        .vjs-control-bar .vjs-icon-placeholder:before,
        .vjs-control-bar .vjs-control-text,
        .vjs-current-time,
        .vjs-time-divider,
        .vjs-duration,
        .vjs-playback-rate .vjs-playback-rate-value {
            color: #ffffff !important;
        }
        /* Volume slider and progress bar handles can stay default; icons remain white */

        .vjs-tech {
            object-fit: contain;
        }

        .vjs-menu-button-popup .vjs-menu {
            left: auto !important;
            right: 0 !important;
        }

        .vjs-menu-button-popup .vjs-menu .vjs-menu-content {
            background-color: rgba(0,0,0,0.9) !important;
            max-height: 20em !important;
        }

        .vjs-menu li.vjs-selected {
            background-color: rgba(255,255,255,0.2) !important;
        }

        .vjs-playback-rate .vjs-playback-rate-value {
            font-size: 1.5em;
            line-height: 2;
        }

        /* Hide download button completely */
        a[download],
        .vjs-control[download],
        .video-js *[download] {
            display: none !important;
        }
        video::-webkit-media-controls-download-button {
            display: none !important;
        }

        @media (max-width: 768px) {
            marquee {
                font-size: 14px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>

    <header>
        <marquee scrollamount="6">{{ file_name }}</marquee>
    </header>

    <div class="container">
        <div class="video-wrapper" id="player-container">
            <video
                id="main-player"
                class="video-js vjs-big-play-centered vjs-show-big-play-button-on-pause"
                controls
                preload="auto"
                playsinline
                controlsList="nodownload"
                oncontextmenu="return false;">
                <source src="{{ file_url }}" type="application/x-mpegURL">
                <source src="{{ file_url }}" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- Video.js Core Script -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@videojs/http-streaming@3.12.0/dist/videojs-http-streaming.min.js"></script>

    <script>
        // --- Player Initialisation (playToggle removed) ---
        const player = videojs('main-player', {
            fluid: true,
            playbackRates: [0.5, 1, 1.25, 1.5, 2],
            controlBar: {
                children: [
                    // 'playToggle' removed – big center button handles play/pause
                    'currentTimeDisplay',
                    'timeDivider',
                    'durationDisplay',
                    'progressControl',
                    'volumePanel',
                    'playbackRateMenuButton',
                    'pictureInPictureToggle',
                    'fullscreenToggle'
                ]
            },
            html5: {
                vhs: {
                    overrideNative: true,
                    smoothQualityChange: true
                }
            }
        });

        // --- DOUBLE TAP TO SEEK (no visual icons) ---
        const container = document.getElementById('player-container');
        let lastTap = 0;

        container.addEventListener('touchstart', function(e) {
            const now = Date.now();
            const timeSinceLastTap = now - lastTap;

            if (timeSinceLastTap < 300 && timeSinceLastTap > 0) {
                const rect = container.getBoundingClientRect();
                const touchX = e.touches[0].clientX - rect.left;
                const midPoint = rect.width / 2;

                if (touchX < midPoint) {
                    player.currentTime(Math.max(0, player.currentTime() - 10));
                } else {
                    player.currentTime(Math.min(player.duration(), player.currentTime() + 10));
                }
                e.preventDefault();
            }
            lastTap = now;
        });

        // --- ERROR RECOVERY ---
        player.on('error', function() {
            setTimeout(function() {
                player.src({
                    src: '{{ file_url }}',
                    type: '{{ file_url }}'.includes('m3u8') ? 'application/x-mpegURL' : 'video/mp4'
                });
                player.load();
                player.play();
            }, 3000);
        });

        // Disable right click
        container.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    </script>
</body>
</html>
