<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }}</title>
    
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway:400,700">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            font-family: 'Raleway', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Marquee Header */
        marquee {
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            color: #fff;
            border-bottom: 1px solid #222;
            display: block;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Player Wrapper */
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
        }

        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16 / 9;
        }

        /* Double Tap UI Indicators */
        .tap-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            color: rgba(255,255,255,0.8);
            pointer-events: none;
            z-index: 10;
            display: none;
            text-shadow: 0 0 15px rgba(0,0,0,0.9);
        }
        .tap-left { left: 15%; }
        .tap-right { right: 15%; }

        @keyframes tapEffect {
            0% { opacity: 0; transform: translateY(-50%) scale(0.8); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
            100% { opacity: 0; transform: translateY(-50%) scale(1); }
        }
        .animate-tap { display: block; animation: tapEffect 0.5s ease-out forwards; }

        .file-details {
            padding: 20px;
            background: #0a0a0a;
        }

        .file-details h2 {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .file-details p {
            font-size: 18px;
            color: #fff;
            word-break: break-all;
            line-height: 1.4;
        }

        /* Video.js Theme Tweaks */
        .vjs-big-play-button {
            background-color: rgba(0, 123, 255, 0.5) !important;
            border-radius: 50% !important;
            width: 2.5em !important;
            height: 2.5em !important;
            line-height: 2.5em !important;
            margin-top: -1.25em !important;
            margin-left: -1.25em !important;
        }
    </style>
</head>
<body>

    <header>
        <marquee scrollamount="6">Playing: {{ file_name }}</marquee>
    </header>

    <div class="container">
        <div class="video-wrapper" id="player-container">
            <video 
                id="main-player" 
                class="video-js vjs-big-play-centered vjs-show-big-play-button-on-pause" 
                controls 
                preload="auto" 
                playsinline>
                <source src="{{ file_url }}" type="application/x-mpegURL">
                <source src="{{ file_url }}" type="video/mp4">
            </video>

            <!-- Visual feedback for double tap -->
            <div id="ind-left" class="tap-indicator tap-left">⏪</div>
            <div id="ind-right" class="tap-indicator tap-right">⏩</div>
        </div>

        <div class="file-details">
            <h2>File Name</h2>
            <p>{{ file_name }}</p>
        </div>
    </div>

    <!-- Video.js Core Script -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        const player = videojs('main-player', {
            fluid: true,
            playbackRates: [0.5, 1, 1.25, 1.5, 2],
            controlBar: {
                children: [
                    'playToggle',
                    'volumePanel',
                    'currentTimeDisplay',
                    'progressControl',
                    'durationDisplay',
                    'playbackRateMenuButton',
                    'fullscreenToggle'
                ]
            }
        });

        // --- DOUBLE TAP TO SEEK CODE ---
        const container = document.getElementById('player-container');
        const indLeft = document.getElementById('ind-left');
        const indRight = document.getElementById('ind-right');
        let lastTap = 0;

        container.addEventListener('touchstart', function(e) {
            const now = Date.now();
            const timeSinceLastTap = now - lastTap;

            if (timeSinceLastTap < 300 && timeSinceLastTap > 0) {
                const rect = container.getBoundingClientRect();
                const touchX = e.touches[0].clientX - rect.left;
                const midPoint = rect.width / 2;

                if (touchX < midPoint) {
                    // Double tapped left
                    player.currentTime(Math.max(0, player.currentTime() - 10));
                    triggerAnimation(indLeft);
                } else {
                    // Double tapped right
                    player.currentTime(Math.min(player.duration(), player.currentTime() + 10));
                    triggerAnimation(indRight);
                }
                e.preventDefault(); // Prevent zooming
            }
            lastTap = now;
        });

        function triggerAnimation(el) {
            el.classList.remove('animate-tap');
            void el.offsetWidth; // Force reflow
            el.classList.add('animate-tap');
            setTimeout(() => el.classList.remove('animate-tap'), 500);
        }

        // --- ERROR RECOVERY ---
        // If the video stops due to network, attempt to reload
        player.on('error', function() {
            setTimeout(() => {
                player.src({ src: '{{ file_url }}', type: '{{ file_url }}'.includes('m3u8') ? 'application/x-mpegURL' : 'video/mp4' });
                player.load();
                player.play();
            }, 3000);
        });

        // Disable right click to protect link slightly
        container.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
