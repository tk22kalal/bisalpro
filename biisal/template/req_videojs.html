<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }}</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway|Delius">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        /* MINIMALIST CSS FOR SPEED */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Raleway', sans-serif; overflow: hidden; -webkit-touch-callout: none; user-select: none; }
        
        marquee { 
            font-size: 15px; font-weight: 600; color: #fff; background: #000; 
            padding: 8px; font-family: 'Delius', serif; width: 100%; border-bottom: 1px solid #222; 
        }

        .container { width: 100%; background: #000; position: relative; }
        .video-js { width: 100% !important; height: auto !important; aspect-ratio: 16 / 9; }
        
        /* Fast-tap Seek Indicators */
        .tap-indicator { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            font-size: 35px; color: #fff; pointer-events: none; z-index: 10; 
            animation: tapFade 0.4s ease-out forwards; text-shadow: 0 0 8px #000; 
        }
        .tap-indicator.left { left: 15%; }
        .tap-indicator.right { right: 15%; }
        @keyframes tapFade { 
            0% { opacity: 0; transform: translateY(-50%) scale(0.5); } 
            50% { opacity: 1; } 
            100% { opacity: 0; transform: translateY(-50%) scale(1.2); } 
        }

        /* UI Enhancements */
        .vjs-big-play-button { 
            border-radius: 50% !important; width: 2.2em !important; height: 2.2em !important; 
            line-height: 2.2em !important; left: 50% !important; top: 50% !important; 
            margin: -1.1em 0 0 -1.1em !important; border: none !important; 
            background: rgba(255,255,255,0.15) !important; backdrop-filter: blur(8px); 
        }
        .vjs-quality-button .vjs-icon-placeholder::before { content: 'HD'; font-size: 1.4em; line-height: 1.8; }
        
        /* Hide unwanted elements to keep it clean */
        .vjs-error-display { background: #000; }
    </style>
</head>
<body>
    <header><marquee>{{ file_name }}</marquee></header>

    <div class="container">
        <!-- Poster removed for faster loading -->
        <video id="player" 
            class="video-js vjs-default-skin vjs-big-play-centered" 
            controls 
            preload="auto" 
            playsinline 
            crossorigin="anonymous">
            <source src="{{ file_url }}" type="application/x-mpegURL">
        </video>
    </div>

    <!-- Video.js and Quality Plugin -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-quality-levels@4.1.0/dist/videojs-contrib-quality-levels.min.js"></script>

    <script>
    (function() {
        const player = videojs('player', {
            fluid: true,
            playbackRates: [0.5, 1, 1.25, 1.5, 2],
            controlBar: {
                // Removed subtitles button since tracks are removed
                children: ['playToggle', 'progressControl', 'volumePanel', 'qualityButton', 'playbackRateMenuButton', 'fullscreenToggle']
            },
            html5: {
                vhs: {
                    overrideNative: true,         // Vital for "Auto" quality ABR to work properly
                    enableLowInitialPlaylist: true, // Starts video faster on slow networks
                    fastQualityChange: true,      // Switches resolution instantly if net speed changes
                    experimentalBufferBasedABR: true
                }
            }
        });

        // --- AUTOMATIC & MANUAL QUALITY LOGIC ---
        const QualityButton = videojs.extend(videojs.getComponent('MenuButton'), {
            constructor: function(p, o) {
                videojs.getComponent('MenuButton').call(this, p, o);
                this.addClass('vjs-quality-button');
            },
            createItems: function() {
                const items = [];
                const levels = this.player().qualityLevels();
                const MenuItem = videojs.getComponent('MenuItem');

                // 1. Auto Quality Item (Uses all available bandwidth)
                const autoItem = new MenuItem(this.player(), { label: 'Auto', selectable: true, selected: true });
                autoItem.on('click', () => {
                    for (let i = 0; i < levels.length; i++) levels[i].enabled = true;
                    autoItem.selected(true);
                });
                items.push(autoItem);

                // 2. Manual Resolution Items
                const heights = [];
                for (let i = 0; i < levels.length; i++) {
                    if (levels[i].height && !heights.includes(levels[i].height)) heights.push(levels[i].height);
                }
                heights.sort((a, b) => b - a).forEach(h => {
                    const item = new MenuItem(this.player(), { label: h + 'p', selectable: true });
                    item.on('click', () => {
                        for (let i = 0; i < levels.length; i++) {
                            levels[i].enabled = (levels[i].height === h);
                        }
                    });
                    items.push(item);
                });
                return items;
            }
        });
        videojs.registerComponent('QualityButton', QualityButton);

        // --- DOUBLE TAP TO SEEK (10s) ---
        let lastTapTime = 0;
        const container = document.querySelector('.container');

        const handleDoubleTap = (e) => {
            const now = Date.now();
            const rect = container.getBoundingClientRect();
            // Works for both touch and mouse
            const clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
            const touchX = clientX - rect.left;
            const side = touchX < rect.width / 2 ? 'left' : 'right';

            if (now - lastTapTime < 300) {
                if (side === 'left') {
                    player.currentTime(Math.max(0, player.currentTime() - 10));
                    showIndicator('left', '⏪ 10s');
                } else {
                    player.currentTime(Math.min(player.duration(), player.currentTime() + 10));
                    showIndicator('right', '10s ⏩');
                }
            }
            lastTapTime = now;
        };

        function showIndicator(side, text) {
            const el = document.createElement('div');
            el.className = `tap-indicator ${side}`;
            el.innerText = text;
            container.appendChild(el);
            setTimeout(() => el.remove(), 400);
        }

        player.ready(() => {
            const tech = player.el().querySelector('.vjs-tech');
            // Fast seek on mobile and desktop
            tech.addEventListener('touchend', handleDoubleTap);
            tech.addEventListener('dblclick', handleDoubleTap);
            
            // Clean interface: Prevent context menu
            player.on('contextmenu', e => e.preventDefault());
        });
    })();
    </script>
</body>
</html>
