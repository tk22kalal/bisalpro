<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta property="og:image" content="https://graph.org/file/5e6d18610741226005e6e.jpg" itemprop="thumbnailUrl">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="monetag" content="f3ecc71ccb639ccf66d9d0dee93d3e7a">
    <title>{{ file_name }}</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Delius">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            font-family: 'Raleway', sans-serif;
            overflow-x: hidden;
        }
        
        marquee {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px;
            font-family: 'Delius', serif;
            width: 100%;
            z-index: 999;
        }
        
        .container {
            width: 100%;
            background: #000;
            position: relative;
        }
        
        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16 / 9;
        }
        
        audio.video-js {
            height: 80px !important;
        }
        
        .vjs-tech {
            object-fit: contain;
        }
        
        .tap-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 60px;
            color: rgba(255, 255, 255, 0.95);
            pointer-events: none;
            z-index: 10000;
            animation: tapFade 0.5s ease-out;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.9);
            font-weight: bold;
        }
        
        .tap-indicator.left {
            left: 50px;
        }
        
        .tap-indicator.right {
            right: 50px;
        }
        
        @keyframes tapFade {
            0% {
                opacity: 1;
                transform: translateY(-50%) scale(0.8);
            }
            50% {
                transform: translateY(-50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateY(-50%) scale(0.8);
            }
        }
        
        .vjs-control-bar {
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85)) !important;
        }
        
        .vjs-big-play-button {
            border-radius: 50% !important;
            width: 2em !important;
            height: 2em !important;
            line-height: 2em !important;
            border: 0.06666em solid #fff !important;
            background-color: rgba(43, 51, 63, 0.7) !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) !important;
        }
        
        .vjs-menu-button-popup .vjs-menu {
            left: auto !important;
            right: 0 !important;
        }
        
        .vjs-menu-button-popup .vjs-menu .vjs-menu-content {
            background-color: rgba(0, 0, 0, 0.9) !important;
            max-height: 20em !important;
        }
        
        .vjs-menu li.vjs-selected {
            background-color: rgba(255, 255, 255, 0.2) !important;
        }
        
        .vjs-playback-rate .vjs-playback-rate-value {
            font-size: 1.5em;
            line-height: 2;
        }
        
        a[download] {
            display: none !important;
        }
        
        .vjs-control[download] {
            display: none !important;
        }
        
        @media (max-width: 768px) {
            marquee {
                font-size: 14px;
                padding: 8px;
            }
            
            .tap-indicator {
                font-size: 48px;
            }
            
            .tap-indicator.left {
                left: 30px;
            }
            
            .tap-indicator.right {
                right: 30px;
            }
        }
    </style>
    <meta name='dmca-site-verification' content='THBkdGsyeW85ZTBMT3VZNHpteGovWEtoV3h5NENqcDdPa2hsUzZiU0ZZST01' />
</head>

<body>
    <header>
        <marquee bgcolor="rgba(0,0,0,0.9)">
            <div id="file-name">{{ file_name }}</div>
        </marquee>
    </header>

    <div class="container">
        <{{ tag }} 
            id="player" 
            class="video-js vjs-default-skin vjs-big-play-centered" 
            controls 
            preload="auto"
            playsinline
            controlsList="nodownload"
            oncontextmenu="return false;"
            crossorigin="anonymous">
            <source src="{{ file_url }}" type="application/x-mpegURL">
        </{{ tag }}>
    </div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@videojs/http-streaming@3.12.0/dist/videojs-http-streaming.min.js"></script>

<script>
(function() {
    'use strict';
    
    const playerElement = document.getElementById('player');
    const container = document.querySelector('.container');
    const source = '{{ file_url }}';
    const isVideo = playerElement.tagName.toLowerCase() === 'video';
    
    let player;
    let lastTapTime = 0;
    let lastTapSide = null;
    
    // Optimized tap indicator with requestAnimationFrame
    function showTapIndicator(side, text) {
        const indicator = document.createElement('div');
        indicator.className = `tap-indicator ${side}`;
        indicator.textContent = text;
        container.appendChild(indicator);
        
        requestAnimationFrame(() => {
            setTimeout(() => {
                if (indicator.parentNode) {
                    indicator.remove();
                }
            }, 500);
        });
    }
    
    // Optimized double-tap handler with debouncing
    let tapTimeout;
    function handleDoubleTap(e) {
        if (!isVideo) return;
        
        const currentTime = Date.now();
        const tapLength = currentTime - lastTapTime;
        const rect = playerElement.getBoundingClientRect();
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const isLeftSide = x < rect.left + (rect.width / 2);
        
        clearTimeout(tapTimeout);
        
        if (tapLength < 300 && tapLength > 0 && isLeftSide === lastTapSide) {
            e.preventDefault();
            e.stopPropagation();
            
            const newTime = isLeftSide 
                ? Math.max(0, player.currentTime() - 10)
                : Math.min(player.duration(), player.currentTime() + 10);
            
            player.currentTime(newTime);
            showTapIndicator(isLeftSide ? 'left' : 'right', isLeftSide ? '⏪ 10s' : '10s ⏩');
            
            lastTapTime = 0;
            lastTapSide = null;
        } else {
            lastTapTime = currentTime;
            lastTapSide = isLeftSide;
            
            tapTimeout = setTimeout(() => {
                lastTapTime = 0;
                lastTapSide = null;
            }, 500);
        }
    }
    
    // Simplified player options for better performance
    const playerOptions = {
        controls: true,
        autoplay: false,
        preload: 'auto',
        fluid: false,
        playbackRates: [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2],
        controlBar: {
            children: [
                'playToggle',
                'currentTimeDisplay',
                'timeDivider',
                'durationDisplay',
                'progressControl',
                'volumePanel',
                'playbackRateMenuButton',
                'pictureInPictureToggle',
                'fullscreenToggle'
            ]
        },
        html5: {
            vhs: {
                overrideNative: true,
                enableLowInitialPlaylist: true,
                smoothQualityChange: true,
                useBandwidthFromLocalStorage: true,
                bandwidth: 4194304,
                handleManifestRedirects: true,
                limitRenditionByPlayerDimensions: false,
                useDevicePixelRatio: true
            },
            nativeVideoTracks: false,
            nativeAudioTracks: false,
            nativeTextTracks: false
        }
    };
    
    // Initialize player
    player = videojs('player', playerOptions);
    
    player.ready(function() {
        const self = this;
        
        // Add event listeners with passive flag for better performance
        playerElement.addEventListener('touchstart', handleDoubleTap, { passive: true });
        playerElement.addEventListener('click', handleDoubleTap);
        
        // Prevent context menu
        playerElement.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }, true);
    });
    
    // Error handling
    player.on('error', function() {
        const error = player.error();
        if (error && error.code === 4) {
            setTimeout(() => {
                player.src({ src: source, type: 'application/x-mpegURL' });
                player.load();
            }, 3000);
        }
    });
    
    // Cleanup on unload
    window.addEventListener('beforeunload', () => {
        if (player) {
            player.dispose();
        }
    });
    
    // Hide download controls with minimal CSS
    const style = document.createElement('style');
    style.textContent = `
        .video-js *[download] { display: none !important; }
        .vjs-control-bar a[download] { display: none !important; }
        video::-webkit-media-controls-download-button { display: none !important; }
    `;
    document.head.appendChild(style);
})();
</script>
    
</body>
</html>
