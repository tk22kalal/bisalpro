<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ file_name }}</title>
  <style>
    :root {
      --progress-played: #ff5722;
      --progress-dot: #ff0000;
      --progress-buffered: rgba(255,255,255,0.4);
      --progress-bg: rgba(255,255,255,0.2);
      --speed-bg: rgba(28,28,28,0.98);
      --font: system-ui,-apple-system,sans-serif;
    }
    * {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    body {
      background: #0f0f0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: var(--font);
      overflow-x: hidden;
    }

    /* ── TITLE BAR ── */
    .title-bar {
      width: 100%; max-width: 850px;
      background: rgba(0,0,0,0.9);
      padding: 10px 14px;
      font-size: 15px; font-weight: 600; color: #fff;
      white-space: nowrap; overflow: hidden;
    }
    .title-bar marquee { display: block; }

    /* ── PLAYER CONTAINER ── */
    .video-container {
      position: relative;
      width: 100%; max-width: 850px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }

    /* ── VIDEO ELEMENT ── */
    #mainVideo {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: block; cursor: pointer;
      object-fit: contain;
      background: #000;
    }
    /* hide native download button & context menu UI */
    video::-webkit-media-controls-download-button { display:none !important; }
    video::-webkit-media-controls-enclosure       { overflow:hidden !important; }

    /* ── TOP GRADIENT ── */
    .top-controls-bg {
      position: absolute; top: 0; left: 0; right: 0; height: 80px;
      background: linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);
      z-index: 10; pointer-events: none; transition: opacity .3s;
    }

    /* ── BUFFER SPINNER ── */
    .buffer-overlay {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      z-index: 15; display: none; pointer-events: none;
    }
    .spinner {
      width: 60px; height: 60px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top: 5px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── UNMUTE PILL ── */
    #unmuteBtn {
      position: absolute; bottom: 70px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff; font-size: 14px; font-weight: 600;
      padding: 10px 20px; border-radius: 30px;
      z-index: 50; cursor: pointer;
      display: none; align-items: center; gap: 8px;
      white-space: nowrap; backdrop-filter: blur(4px);
    }

    /* ── SETTINGS GEAR ── */
    .settings-btn {
      position: absolute; top: 15px; right: 15px; z-index: 20;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .3s;
    }
    .settings-menu {
      position: absolute; top: 55px; right: 15px;
      background: var(--speed-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px; width: 320px;
      display: none; flex-direction: column;
      z-index: 30; overflow: hidden; padding-bottom: 12px;
    }
    .settings-menu.active { display: flex; }
    .menu-view { padding: 5px 0; }
    .menu-item {
      padding: 12px 16px; color: #fff; font-size: 14px;
      cursor: pointer; display: flex; justify-content: space-between;
    }
    .menu-item:hover { background: rgba(255,255,255,0.1); }

    /* ── SPEED UI ── */
    .speed-view { display: none; padding: 8px 15px; }
    .speed-top-nav { display: flex; align-items: center; height: 30px; }
    .back-btn { background: none; border: none; cursor: pointer; padding: 5px; }
    .speed-display-large { color:#fff; font-size:22px; font-weight:500; text-align:center; margin-bottom:12px; margin-top:-15px; }
    .slider-row { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:18px; }
    .adj-btn { width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .speed-range { -webkit-appearance:none; width:160px; height:3px; background:rgba(255,255,255,0.3); border-radius:2px; outline:none; }
    .speed-range::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:#fff; cursor:pointer; }
    .pills-container { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; align-items:flex-start; }
    .pill-wrapper { display:flex; flex-direction:column; align-items:center; gap:4px; }
    .pill { background:rgba(255,255,255,0.1); border:none; color:#fff; width:48px; height:36px; border-radius:8px; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .pill:hover { background:rgba(255,255,255,0.2); }
    .normal-label { font-size:11px; color:rgba(255,255,255,0.6); }

    /* ── CENTER PLAY/PAUSE ── */
    .center-play {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; cursor: pointer; transition: opacity .3s;
    }

    /* ── AUTO-HIDE ── */
    .video-container.inactive .controls-overlay,
    .video-container.inactive .settings-btn,
    .video-container.inactive .center-play,
    .video-container.inactive .top-controls-bg { opacity: 0; pointer-events: none; }

    /* ── SEEK ANIMATIONS ── */
    .seek-feedback {
      position: absolute; top: 0; bottom: 0; width: 50%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 4; opacity: 0;
    }
    .seek-left { left: 0; } .seek-right { right: 0; }
    .seek-feedback svg { width: 50px; fill: rgba(0,0,0,0.6); }
    @keyframes seekAnim {
      0%   { opacity:0; transform:scale(0.8); }
      30%  { opacity:1; transform:scale(1); }
      100% { opacity:0; transform:scale(1.1); }
    }
    .animate-seek { animation: seekAnim .6s ease-out forwards; }

    /* ── CONTROLS OVERLAY ── */
    .controls-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent,rgba(0,0,0,0.85));
      padding: 10px 15px 15px; display: flex; flex-direction: column; gap: 10px;
      z-index: 25; transition: opacity .3s;
    }
    .controls-row { display:flex; align-items:center; justify-content:space-between; }
    .time-box { color:#fff; font-size:14px; font-variant-numeric:tabular-nums; }
    .action-group { display:flex; align-items:center; gap:14px; }
    .ctrl-btn { background:none; border:none; cursor:pointer; display:flex; align-items:center; }
    .ctrl-btn svg { width:24px; height:24px; fill:#fff; }

    /* ── PROGRESS BAR ── */
    .prog-container { width:100%; display:flex; align-items:center; }
    .prog-bar {
      -webkit-appearance:none; appearance:none;
      width:100%; height:4px; border-radius:2px;
      background:var(--progress-bg); outline:none; cursor:pointer;
    }
    .prog-bar::-webkit-slider-thumb {
      -webkit-appearance:none;
      width:14px; height:14px; border-radius:50%;
      background:var(--progress-dot);
      box-shadow:0 0 2px rgba(0,0,0,0.5);
    }

    @media (max-width:768px) { .title-bar { font-size:13px; } }
  </style>
</head>
<body>

  <div class="title-bar"><marquee>{{ file_name }}</marquee></div>

  <div class="video-container" id="vc">

    <!-- Native HTML5 video — no VideoJS needed for direct byte-range streams -->
    <video id="mainVideo"
      autoplay muted playsinline
      preload="auto"
      controlsList="nodownload"
      oncontextmenu="return false;"
      {% if poster_url %}poster="{{ poster_url }}"{% endif %}>
      <source src="{{ file_url }}" type="{{ mime_type or 'video/mp4' }}">
    </video>

    <div class="top-controls-bg"></div>

    <div class="buffer-overlay" id="bufSpin"><div class="spinner"></div></div>

    <!-- Unmute pill -->
    <div id="unmuteBtn">
      <svg viewBox="0 0 24 24" width="18" fill="#fff"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      Tap to unmute
    </div>

    <!-- Settings gear -->
    <button class="settings-btn" id="setBtn">
      <svg viewBox="0 0 24 24" fill="white" width="28"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>

    <!-- Settings menu -->
    <div class="settings-menu" id="setMenu">
      <div id="mainMenuView" class="menu-view">
        <div class="menu-item" id="openSpeed">Speed <span id="curSpeedLbl">1x</span></div>
        <div class="menu-item" id="pipBtn">Picture-in-Picture</div>
      </div>
      <div id="speedView" class="speed-view">
        <div class="speed-top-nav">
          <button class="back-btn" id="backBtn">
            <svg viewBox="0 0 24 24" width="22" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </button>
        </div>
        <div class="speed-display-large" id="bigSpeedLbl">1.0x</div>
        <div class="slider-row">
          <button class="adj-btn" id="minusBtn">−</button>
          <input type="range" class="speed-range" id="speedRange" min="0.25" max="3" step="0.05" value="1">
          <button class="adj-btn" id="plusBtn">+</button>
        </div>
        <div class="pills-container">
          <button class="pill" data-val="0.5">0.5</button>
          <div class="pill-wrapper">
            <button class="pill" data-val="1.0">1.0</button>
            <span class="normal-label">Normal</span>
          </div>
          <button class="pill" data-val="1.5">1.5</button>
          <button class="pill" data-val="2.0">2.0</button>
          <button class="pill" data-val="3.0">3.0</button>
        </div>
      </div>
    </div>

    <!-- Seek feedback -->
    <div class="seek-feedback seek-left"  id="seekLeft"><svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg></div>
    <div class="seek-feedback seek-right" id="seekRight"><svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg></div>

    <!-- Center play/pause -->
    <div class="center-play" id="centerPlay">
      <svg id="playIcon" viewBox="0 0 24 24" width="34"><path d="M8 5v14l11-7z" fill="black"/></svg>
    </div>

    <!-- Bottom controls -->
    <div class="controls-overlay">
      <div class="controls-row">
        <div class="time-box"><span id="currTime">0:00</span> / <span id="durEl">0:00</span></div>
        <div class="action-group">
          <button class="ctrl-btn" id="volBtn"><svg id="volIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>
          <button class="ctrl-btn" id="fullBtn"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
        </div>
      </div>
      <div class="prog-container">
        <input type="range" class="prog-bar" id="progBar" min="0" max="100" value="0" step="0.1">
      </div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const vid       = document.getElementById('mainVideo');
    const vc        = document.getElementById('vc');
    const progBar   = document.getElementById('progBar');
    const currTime  = document.getElementById('currTime');
    const durEl     = document.getElementById('durEl');
    const playIcon  = document.getElementById('playIcon');
    const bufSpin   = document.getElementById('bufSpin');
    const setBtn    = document.getElementById('setBtn');
    const setMenu   = document.getElementById('setMenu');
    const unmuteBtn = document.getElementById('unmuteBtn');
    const volIcon   = document.getElementById('volIcon');
    const speedRange= document.getElementById('speedRange');
    const PAUSE_PATH= 'M8 5v14l11-7z';
    const PLAY_PATH = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';

    let hideTimer, seeking = false;

    // ── SECURITY ──────────────────────────────────────────────────────────────
    vc.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); }, true);
    let pressTimer;
    vc.addEventListener('touchstart', e => { pressTimer = setTimeout(() => e.preventDefault(), 500); }, { passive: false });
    vc.addEventListener('touchend',  () => clearTimeout(pressTimer));
    vc.addEventListener('touchmove', () => clearTimeout(pressTimer));

    // ── AUTOPLAY + UNMUTE FLOW ────────────────────────────────────────────────
    function doUnmute() {
      vid.muted = false;
      volIcon.style.opacity = 1;
      unmuteBtn.style.display = 'none';
    }
    // Try to autoplay; if browser blocks it, show a play button
    const autoplayPromise = vid.play();
    if (autoplayPromise !== undefined) {
      autoplayPromise.catch(() => {
        // Autoplay blocked — show center play button so user can start manually
        updatePlayIcon();
        showUI();
      });
    }
    unmuteBtn.addEventListener('click', e => { e.stopPropagation(); doUnmute(); });
    // First tap anywhere unmutes
    vc.addEventListener('pointerdown', () => { if (vid.muted) doUnmute(); }, { once: true });

    // ── BUFFERING SPINNER ─────────────────────────────────────────────────────
    vid.addEventListener('waiting',  () => { bufSpin.style.display = 'block'; });
    vid.addEventListener('playing',  () => { bufSpin.style.display = 'none'; });
    vid.addEventListener('canplay',  () => { bufSpin.style.display = 'none'; });
    vid.addEventListener('seeking',  () => { bufSpin.style.display = 'block'; });
    vid.addEventListener('seeked',   () => { bufSpin.style.display = 'none'; });

    // ── PLAY / PAUSE STATE ────────────────────────────────────────────────────
    function updatePlayIcon() {
      playIcon.innerHTML = `<path d="${vid.paused ? PAUSE_PATH : PLAY_PATH}" fill="black"/>`;
    }
    vid.addEventListener('play',  () => {
      updatePlayIcon();
      resetHideTimer();
      if (vid.muted) unmuteBtn.style.display = 'flex';
    });
    vid.addEventListener('pause', () => { updatePlayIcon(); showUI(); });

    // ── AUTO-HIDE ─────────────────────────────────────────────────────────────
    function showUI() { vc.classList.remove('inactive'); resetHideTimer(); }
    function hideUI() { vc.classList.add('inactive'); setMenu.classList.remove('active'); }
    function resetHideTimer() {
      clearTimeout(hideTimer);
      if (!vid.paused) hideTimer = setTimeout(hideUI, 3500);
    }

    // ── SINGLE TAP = TOGGLE UI / DOUBLE TAP = SEEK ───────────────────────────
    let lastTapTime = 0, lastTapSide = null, tapTimeout;

    vid.addEventListener('pointerup', e => {
      const now = Date.now();
      const isLeft = e.offsetX < vid.clientWidth / 2;

      if (now - lastTapTime < 300 && isLeft === lastTapSide) {
        // Double tap — seek ±10s
        clearTimeout(tapTimeout);
        const delta = isLeft ? -10 : 10;
        vid.currentTime = Math.max(0, Math.min(vid.duration || 0, vid.currentTime + delta));
        const el = document.getElementById(isLeft ? 'seekLeft' : 'seekRight');
        el.classList.remove('animate-seek'); void el.offsetWidth; el.classList.add('animate-seek');
        lastTapTime = 0;
        return;
      }
      lastTapTime = now; lastTapSide = isLeft;
      tapTimeout = setTimeout(() => {
        if (vc.classList.contains('inactive')) showUI();
        else hideUI();
      }, 250);
    });

    // Center play/pause button
    document.getElementById('centerPlay').addEventListener('click', e => {
      e.stopPropagation();
      vid.paused ? vid.play() : vid.pause();
      resetHideTimer();
    });

    // ── PROGRESS BAR ─────────────────────────────────────────────────────────
    const fmt = s => isNaN(s) || !isFinite(s)
      ? '0:00'
      : `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

    function updateBar() {
      if (seeking) return;
      const dur = vid.duration || 0;
      const played = dur ? (vid.currentTime / dur) * 100 : 0;
      let bufEnd = 0;
      for (let i = 0; i < vid.buffered.length; i++)
        if (vid.buffered.start(i) <= vid.currentTime) bufEnd = vid.buffered.end(i);
      const buffered = dur ? (bufEnd / dur) * 100 : 0;
      progBar.value = played;
      progBar.style.background = `linear-gradient(to right,
        var(--progress-played) ${played}%,
        var(--progress-buffered) ${played}% ${buffered}%,
        var(--progress-bg) ${buffered}%)`;
    }

    vid.addEventListener('timeupdate', () => { currTime.textContent = fmt(vid.currentTime); updateBar(); });
    vid.addEventListener('progress',   updateBar);
    vid.addEventListener('loadedmetadata', () => { durEl.textContent = fmt(vid.duration); });

    progBar.addEventListener('mousedown',  () => { seeking = true; });
    progBar.addEventListener('touchstart', () => { seeking = true; }, { passive: true });
    progBar.addEventListener('input', e => {
      vid.currentTime = (e.target.value / 100) * (vid.duration || 0);
      resetHideTimer();
    });
    progBar.addEventListener('mouseup',  () => { seeking = false; updateBar(); });
    progBar.addEventListener('touchend', () => { seeking = false; updateBar(); });

    // ── VOLUME / MUTE ─────────────────────────────────────────────────────────
    document.getElementById('volBtn').addEventListener('click', e => {
      e.stopPropagation();
      vid.muted = !vid.muted;
      volIcon.style.opacity = vid.muted ? 0.4 : 1;
      if (!vid.muted) unmuteBtn.style.display = 'none';
      resetHideTimer();
    });

    // ── FULLSCREEN ────────────────────────────────────────────────────────────
    document.getElementById('fullBtn').addEventListener('click', e => {
      e.stopPropagation();
      if (document.fullscreenElement) document.exitFullscreen();
      else vc.requestFullscreen().catch(() => vid.webkitEnterFullscreen && vid.webkitEnterFullscreen());
      resetHideTimer();
    });

    // ── SETTINGS ─────────────────────────────────────────────────────────────
    setBtn.addEventListener('click', e => { e.stopPropagation(); setMenu.classList.toggle('active'); resetHideTimer(); });
    document.addEventListener('click', () => setMenu.classList.remove('active'));

    function showView(id) {
      ['mainMenuView','speedView'].forEach(v => {
        document.getElementById(v).style.display = v === id ? 'block' : 'none';
      });
    }
    document.getElementById('openSpeed').addEventListener('click', e => { e.stopPropagation(); showView('speedView'); });
    document.getElementById('backBtn').addEventListener('click',   e => { e.stopPropagation(); showView('mainMenuView'); });

    // ── SPEED CONTROL ─────────────────────────────────────────────────────────
    function setSpeed(val) {
      val = Math.max(0.25, Math.min(3, parseFloat(val)));
      vid.playbackRate = val;
      speedRange.value = val;
      const t = val.toFixed(2).replace(/\.?0+$/, '') + 'x';
      document.getElementById('bigSpeedLbl').textContent = t;
      document.getElementById('curSpeedLbl').textContent = t;
    }
    speedRange.addEventListener('input', e => setSpeed(e.target.value));
    document.getElementById('minusBtn').addEventListener('click', e => { e.stopPropagation(); setSpeed(vid.playbackRate - 0.05); });
    document.getElementById('plusBtn').addEventListener('click',  e => { e.stopPropagation(); setSpeed(vid.playbackRate + 0.05); });
    document.querySelectorAll('.pill').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); setSpeed(b.dataset.val); }));

    // ── PICTURE-IN-PICTURE ────────────────────────────────────────────────────
    document.getElementById('pipBtn').addEventListener('click', e => {
      e.stopPropagation(); setMenu.classList.remove('active');
      if (document.pictureInPictureEnabled) {
        document.pictureInPictureElement ? document.exitPictureInPicture() : vid.requestPictureInPicture();
      }
    });

  })();
  </script>
</body>
</html>
