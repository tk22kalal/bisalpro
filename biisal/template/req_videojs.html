<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }}</title>
    
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway:400,700">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Delius">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            font-family: 'Raleway', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Marquee header – now exactly like Code 2 */
        marquee {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: rgba(0,0,0,0.9);
            padding: 10px;
            font-family: 'Delius', serif;
            width: 100%;
            z-index: 999;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Player Wrapper */
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
        }

        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16 / 9;
        }

        /* Video.js Theme Tweaks */
        .vjs-big-play-button {
            background-color: rgba(0, 123, 255, 0.5) !important;
            border-radius: 50% !important;
            width: 2.5em !important;
            height: 2.5em !important;
            line-height: 2.5em !important;
            margin-top: -1.25em !important;
            margin-left: -1.25em !important;
        }

        /* Mobile responsive font size */
        @media (max-width: 768px) {
            marquee {
                font-size: 14px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>

    <header>
        <!-- Marquee with just the file name (no "Playing:" text) -->
        <marquee scrollamount="6">{{ file_name }}</marquee>
    </header>

    <div class="container">
        <div class="video-wrapper" id="player-container">
            <video 
                id="main-player" 
                class="video-js vjs-big-play-centered vjs-show-big-play-button-on-pause" 
                controls 
                preload="auto" 
                playsinline>
                <source src="{{ file_url }}" type="application/x-mpegURL">
                <source src="{{ file_url }}" type="video/mp4">
            </video>

            <!-- Visual feedback indicators removed (no double‑tap icons) -->
        </div>

        <!-- File details block removed (no "file name" heading or black box) -->
    </div>

    <!-- Video.js Core Script -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        const player = videojs('main-player', {
            fluid: true,
            playbackRates: [0.5, 1, 1.25, 1.5, 2],
            controlBar: {
                children: [
                    'playToggle',
                    'volumePanel',
                    'currentTimeDisplay',
                    'progressControl',
                    'durationDisplay',
                    'playbackRateMenuButton',
                    'fullscreenToggle'
                ]
            }
        });

        // --- DOUBLE TAP TO SEEK (no visual icons) ---
        const container = document.getElementById('player-container');
        let lastTap = 0;

        container.addEventListener('touchstart', function(e) {
            const now = Date.now();
            const timeSinceLastTap = now - lastTap;

            if (timeSinceLastTap < 300 && timeSinceLastTap > 0) {
                const rect = container.getBoundingClientRect();
                const touchX = e.touches[0].clientX - rect.left;
                const midPoint = rect.width / 2;

                if (touchX < midPoint) {
                    // Double tapped left
                    player.currentTime(Math.max(0, player.currentTime() - 10));
                } else {
                    // Double tapped right
                    player.currentTime(Math.min(player.duration(), player.currentTime() + 10));
                }
                e.preventDefault(); // Prevent zooming
            }
            lastTap = now;
        });

        // --- ERROR RECOVERY ---
        player.on('error', function() {
            setTimeout(() => {
                player.src({ src: '{{ file_url }}', type: '{{ file_url }}'.includes('m3u8') ? 'application/x-mpegURL' : 'video/mp4' });
                player.load();
                player.play();
            }, 3000);
        });

        // Disable right click to protect link slightly
        container.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
