<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }}</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
        .video-js { width: 100vw; height: 100vh; }
        /* Professional Title Bar */
        .vjs-title-bar { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; padding: 10px; z-index: 10; font-family: sans-serif; font-size: 14px; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="vjs-title-bar">{{ file_name }}</div>
    
    <video id="player" class="video-js vjs-default-skin vjs-big-play-centered" 
           controls preload="auto" playsinline webkit-playsinline 
           data-setup='{}'>
        <source src="{{ file_url }}" type="application/x-mpegURL">
    </video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('player', {
            autoplay: false,
            fluid: false,
            playbackRates: [0.5, 1, 1.5, 2],
            html5: {
                vhs: {
                    overrideNative: false // IMPORTANT: Allows iOS/Safari to work
                },
                nativeVideoTracks: true,
                nativeAudioTracks: true,
                nativeTextTracks: true
            }
        });

        // Security: Prevent Download shortcut and Inspect
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 's' || e.key === 'u' || e.key === 'i')) e.preventDefault();
        });
    </script>
</body>
</html>
