<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }}</title>

    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,700">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            font-family: 'Roboto', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Marquee – now a static bar above the video, no overlap */
        marquee {
            font-size: 16px;
            font-weight: 400;
            color: #fff;
            padding: 10px 15px;
            width: 100%;
            flex-shrink: 0;              /* doesn’t shrink */
            background: #000;            /* solid background so it doesn’t show through */
        }

        .container {
            flex: 1;                     /* fills remaining height */
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;           /* keeps the video contained */
        }

        .video-wrapper {
            width: 100%;
            position: relative;
            /* the player will take the height it needs */
        }

        /* ----- THE BIG CENTER PLAY BUTTON (off‑white circle) ----- */
        .vjs-big-play-button {
            background-color: #e3e3e3 !important;
            border: none !important;
            border-radius: 50% !important;
            width: 80px !important;
            height: 80px !important;
            line-height: 80px !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5) !important;
        }

        /* Black triangle icon */
        .vjs-big-play-button .vjs-icon-placeholder:before {
            color: #000 !important;
            font-size: 40px !important;
            content: "\f101" !important;
        }

        /* ----- CONTROL BAR LAYOUT (two rows) ----- */
        .vjs-control-bar {
            background: linear-gradient(transparent, rgba(0,0,0,0.7)) !important;
            display: flex !important;
            flex-wrap: wrap !important;
            height: 80px !important;
            align-items: center !important;
            padding: 0 10px !important;
        }

        /* Row 1: Time on left, buttons on right */
        .vjs-current-time {
            display: block !important;
            order: 1;
            font-size: 16px !important;
        }
        .vjs-time-divider, .vjs-duration, .vjs-remaining-time-display { display: none !important; }

        .vjs-volume-panel { order: 2; margin-left: auto !important; }
        .vjs-fullscreen-control { order: 3; }
        .vjs-playback-rate { order: 4; }

        /* Row 2: Progress Bar full width */
        .vjs-progress-control {
            order: 5;
            width: 100% !important;
            height: 30px !important;
            position: relative;
        }

        /* ----- PROGRESS BAR STYLING (white) ----- */
        .video-js .vjs-progress-holder {
            height: 4px !important;
            margin: 0 !important;
            background-color: rgba(255,255,255,0.3) !important;
        }

        .video-js .vjs-play-progress {
            background-color: #fff !important;
        }

        /* Circle scrubber */
        .video-js .vjs-play-progress:before {
            font-size: 18px !important;
            color: #fff !important;
            top: -7px !important;
            content: "●" !important;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Icons */
        .vjs-button > .vjs-icon-placeholder:before {
            font-size: 22px !important;
            line-height: 1.8 !important;
        }

        .vjs-picture-in-picture-control { display: none !important; }

        /* Mobile */
        @media (max-width: 768px) {
            .vjs-big-play-button { width: 60px !important; height: 60px !important; line-height: 60px !important; }
            .vjs-big-play-button .vjs-icon-placeholder:before { font-size: 30px !important; }
        }
    </style>
</head>
<body>

    <!-- Marquee now sits above the video, not over it -->
    <marquee scrollamount="5">{{ file_name }}</marquee>

    <div class="container">
        <div class="video-wrapper" id="player-container">
            <video
                id="main-player"
                class="video-js vjs-fluid"
                controls
                preload="auto"
                playsinline
                oncontextmenu="return false;">
                <source src="{{ file_url }}" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- Video.js Core Script -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        const player = videojs('main-player', {
            controlBar: {
                children: [
                    'currentTimeDisplay',
                    'volumePanel',
                    'fullscreenToggle',
                    'playbackRateMenuButton',
                    'progressControl'
                ]
            }
        });

        // --- FIX: Tap the middle of the video to toggle play/pause ---
        player.on('click', function(e) {
            // Ignore clicks on the control bar and the big button (it handles itself)
            if (e.target.closest('.vjs-control-bar') || e.target.closest('.vjs-big-play-button')) {
                return;
            }
            if (player.paused()) {
                player.play();
            } else {
                player.pause();
            }
        });

        // --- Double tap to seek (unchanged) ---
        const container = document.getElementById('player-container');
        let lastTap = 0;
        container.addEventListener('touchstart', function(e) {
            const now = Date.now();
            if (now - lastTap < 300) {
                const rect = container.getBoundingClientRect();
                const touchX = e.touches[0].clientX - rect.left;
                if (touchX < rect.width / 2) {
                    player.currentTime(player.currentTime() - 10);
                } else {
                    player.currentTime(player.currentTime() + 10);
                }
                e.preventDefault();
            }
            lastTap = now;
        });

        // --- Error recovery (unchanged) ---
        player.on('error', function() {
            setTimeout(() => { player.load(); player.play(); }, 3000);
        });
    </script>
</body>
</html>
