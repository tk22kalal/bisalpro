<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ file_name }}</title>
  
  <!-- HLS.js for .m3u8 support and aggressive preloading -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway|Delius">
  
  <style>
    :root {
      --progress-played: #ff5722;
      --progress-dot: #ff0000;
      --progress-buffered: rgba(255, 255, 255, 0.4);
      --progress-bg: rgba(255, 255, 255, 0.2);
      --speed-bg: rgba(28, 28, 28, 0.98);
      --font: 'Raleway', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 🛑 FORCE HIDE NATIVE BROWSER CONTROLS */
    video::-webkit-media-controls { display: none !important; }
    video::-webkit-media-controls-enclosure { display: none !important; }
    video::-webkit-media-controls-panel { display: none !important; }

    body {
      background-color: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: var(--font);
      overflow: hidden;
    }

    header { width: 100%; position: fixed; top: 0; z-index: 50; }
    marquee { 
      font-size: 18px; font-weight: 600; color: #fff; 
      background: rgba(0,0,0,0.85); padding: 10px; 
      font-family: 'Delius', serif; 
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      background: #000;
      overflow: hidden;
    }

    video { 
      width: 100%; height: 100%; display: block; 
      object-fit: contain;
      cursor: none; /* Hide cursor on video area */
    }

    .top-shadow {
      position: absolute; top: 0; left: 0; right: 0; height: 100px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
      z-index: 10; pointer-events: none; transition: opacity 0.3s;
    }

    .buffer-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 15; display: none; pointer-events: none;
    }
    .spinner {
      width: 60px; height: 60px; border: 5px solid rgba(255, 255, 255, 0.2);
      border-top: 5px solid #ffffff; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .settings-btn {
      position: absolute; top: 20px; right: 20px; z-index: 25;
      background: none; border: none; cursor: pointer; transition: opacity 0.3s;
    }

    .settings-menu {
      position: absolute; top: 60px; right: 20px;
      background: var(--speed-bg); border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.1); width: 320px;
      display: none; flex-direction: column; z-index: 40; padding-bottom: 12px;
    }
    .settings-menu.active { display: flex; }
    .menu-item { padding: 12px 16px; color: #fff; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; }
    .menu-item:hover { background: rgba(255,255,255,0.1); }

    .speed-view { display: none; padding: 8px 15px; flex-direction: column; }
    .speed-display-large { color: #fff; font-size: 22px; font-weight: 500; text-align: center; margin-bottom: 15px; margin-top: -10px; }
    .slider-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .adj-btn { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .speed-range { -webkit-appearance: none; width: 160px; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; outline: none; }
    .speed-range::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; }
    
    .pills-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .pill-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .pill { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 50px; height: 36px; border-radius: 8px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .normal-label { font-size: 10px; color: rgba(255,255,255,0.6); }

    .center-play {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80px; height: 80px; background: rgba(255, 255, 255, 0.95);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      z-index: 20; cursor: pointer; transition: opacity 0.3s;
    }

    .video-container.inactive .controls-overlay,
    .video-container.inactive .settings-btn,
    .video-container.inactive .center-play,
    .video-container.inactive .top-shadow {
      opacity: 0; pointer-events: none;
    }

    .seek-feedback { position: absolute; top: 0; bottom: 0; width: 50%; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 4; opacity: 0; }
    .seek-left { left: 0; } .seek-right { right: 0; }
    @keyframes seekAnim { 0% { opacity: 0; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.1); } }
    .animate-seek { animation: seekAnim 0.6s ease-out forwards; }

    .controls-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      padding: 10px 15px 15px 15px; display: flex; flex-direction: column; gap: 10px;
      z-index: 25; transition: opacity 0.3s;
    }
    .controls-row { display: flex; align-items: center; justify-content: space-between; }
    .time-box { color: #fff; font-size: 14px; font-variant-numeric: tabular-nums; }
    .action-group { display: flex; align-items: center; gap: 18px; }
    .ctrl-btn { background: none; border: none; cursor: pointer; }
    .ctrl-btn svg { width: 24px; height: 24px; fill: #fff; }

    .prog-bar {
      -webkit-appearance: none; width: 100%; height: 4px;
      border-radius: 2px; background: var(--progress-bg);
      outline: none; cursor: pointer;
    }
    .prog-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--progress-dot); }
  </style>
</head>
<body oncontextmenu="return false;">

  <header><marquee>{{ file_name }}</marquee></header>

  <div class="video-container" id="playerContainer">
    <!-- 🛑 IMPORTANT: NO "controls" attribute here -->
    <video id="mainVideo" playsinline webkit-playsinline preload="auto" crossorigin="anonymous"></video>

    <div class="top-shadow"></div>
    <div class="buffer-overlay" id="bufferSpinner"><div class="spinner"></div></div>

    <!-- Settings Gear -->
    <button class="settings-btn" id="setBtn">
      <svg viewBox="0 0 24 24" fill="white" width="28"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>

    <div class="settings-menu" id="setMenu">
      <div id="mainMenuView">
        <div class="menu-item" id="openSpeed">Playback Speed <span id="currentSpeedLabel">1x</span></div>
        <div class="menu-item" id="pipOption">Picture-in-Picture</div>
      </div>
      <div id="speedView" class="speed-view">
        <div class="menu-item" id="backToMenu" style="font-weight: bold;">← Back</div>
        <div class="speed-display-large" id="largeSpeedLabel">1.0x</div>
        <div class="slider-row"><button class="adj-btn" id="minusBtn">−</button><input type="range" class="speed-range" id="speedRange" min="0.5" max="3" step="0.05" value="1"><button class="adj-btn" id="plusBtn">+</button></div>
        <div class="pills-container"><button class="pill" data-val="0.5">0.5</button><div class="pill-wrapper"><button class="pill" data-val="1.0">1.0</button><span class="normal-label">Normal</span></div><button class="pill" data-val="1.5">1.5</button><button class="pill" data-val="2.0">2.0</button><button class="pill" data-val="3.0">3.0</button></div>
      </div>
    </div>

    <!-- Center Play -->
    <div class="center-play" id="centerBtn">
       <svg id="playIcon" viewBox="0 0 24 24" width="36"><path d="M8 5v14l11-7z" fill="black"/></svg>
    </div>

    <div class="seek-feedback seek-left" id="seekLeft"><svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.6)" width="60"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg></div>
    <div class="seek-feedback seek-right" id="seekRight"><svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.6)" width="60"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg></div>

    <div class="controls-overlay">
      <div class="controls-row">
        <div class="time-box"><span id="currTime">0:00</span> / <span id="duration">0:00</span></div>
        <div class="action-group">
          <button class="ctrl-btn" id="volBtn"><svg id="volIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>
          <button class="ctrl-btn" id="fullBtn"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
        </div>
      </div>
      <input type="range" class="prog-bar" id="progBar" min="0" max="100" value="0" step="0.1">
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      const video = document.getElementById('mainVideo');
      const playerContainer = document.getElementById('playerContainer');
      const hlsUrl = "{{ file_url }}"; // THIS MUST BE A VALID URL

      // 1. HLS SETUP
      if (Hls.isSupported()) {
        const hls = new Hls({
          maxBufferLength: 60,
          maxMaxBufferLength: 120,
          enableWorker: true,
          lowLatencyMode: true
        });
        hls.loadSource(hlsUrl);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = hlsUrl;
      }

      // 2. LONG PRESS & SECURITY
      let pressTimer;
      playerContainer.addEventListener('touchstart', (e) => {
        pressTimer = setTimeout(() => { e.preventDefault(); }, 500);
      }, { passive: false });
      playerContainer.addEventListener('touchend', () => clearTimeout(pressTimer));

      // 3. UI TOGGLE & AUTO-HIDE
      let hideTimer;
      const showUI = () => { playerContainer.classList.remove('inactive'); resetHideTimer(); };
      const hideUI = () => { playerContainer.classList.add('inactive'); setMenu.classList.remove('active'); };
      const resetHideTimer = () => { clearTimeout(hideTimer); if (!video.paused) hideTimer = setTimeout(hideUI, 3500); };

      video.addEventListener('click', (e) => {
        if (e.detail === 2) {
          const x = e.clientX - video.getBoundingClientRect().left;
          const target = x < video.clientWidth / 2 ? 'seekLeft' : 'seekRight';
          video.currentTime += (target === 'seekLeft' ? -10 : 10);
          const el = document.getElementById(target);
          el.classList.remove('animate-seek'); void el.offsetWidth; el.classList.add('animate-seek');
          return;
        }
        playerContainer.classList.contains('inactive') ? showUI() : hideUI();
      });

      document.getElementById('centerBtn').onclick = (e) => {
        e.stopPropagation();
        video.paused ? video.play() : video.pause();
      };

      video.onplay = () => { document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="black"/>'; resetHideTimer(); };
      video.onpause = () => { document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z" fill="black"/>'; showUI(); };

      // 4. BUFFERING & PROGRESS
      const spinner = document.getElementById('bufferSpinner');
      const progBar = document.getElementById('progBar');
      video.addEventListener('waiting', () => spinner.style.display = 'block');
      video.addEventListener('playing', () => spinner.style.display = 'none');
      
      function updateProgress() {
        const played = (video.currentTime / video.duration) * 100 || 0;
        let bufferedEnd = 0;
        if (video.buffered.length > 0) {
          for (let i = 0; i < video.buffered.length; i++) {
            if (video.buffered.start(i) <= video.currentTime) bufferedEnd = video.buffered.end(i);
          }
        }
        const buffered = (bufferedEnd / video.duration) * 100 || 0;
        progBar.style.background = `linear-gradient(to right, var(--progress-played) 0%, var(--progress-played) ${played}%, var(--progress-buffered) ${played}%, var(--progress-buffered) ${buffered}%, var(--progress-bg) ${buffered}%, var(--progress-bg) 100%)`;
        document.getElementById('currTime').textContent = fmt(video.currentTime);
      }

      const fmt = (s) => isNaN(s) ? "0:00" : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
      video.ontimeupdate = updateProgress;
      video.addEventListener('progress', updateProgress);
      video.onloadedmetadata = () => {
        document.getElementById('duration').textContent = fmt(video.duration);
        updateProgress();
      };
      progBar.oninput = (e) => { video.currentTime = (e.target.value / 100) * video.duration; resetHideTimer(); };

      // 5. SETTINGS
      const setBtn = document.getElementById('setBtn');
      const setMenu = document.getElementById('setMenu');
      setBtn.onclick = (e) => { e.stopPropagation(); setMenu.classList.toggle('active'); resetHideTimer(); };
      document.getElementById('openSpeed').onclick = (e) => { e.stopPropagation(); document.getElementById('mainMenuView').style.display='none'; document.getElementById('speedView').style.display='flex'; };
      document.getElementById('backToMenu').onclick = (e) => { e.stopPropagation(); document.getElementById('mainMenuView').style.display='block'; document.getElementById('speedView').style.display='none'; };
      document.onclick = () => setMenu.classList.remove('active');

      function updateSpeed(val) {
        val = Math.max(0.5, Math.min(3, parseFloat(val)));
        video.playbackRate = val;
        document.getElementById('speedRange').value = val;
        const t = val.toFixed(2).replace(/[.,]00$/, "") + 'x';
        document.getElementById('largeSpeedLabel').textContent = t;
        document.getElementById('currentSpeedLabel').textContent = t;
      }
      document.getElementById('speedRange').oninput = (e) => updateSpeed(e.target.value);
      document.getElementById('minusBtn').onclick = (e) => { e.stopPropagation(); updateSpeed(video.playbackRate - 0.05); };
      document.getElementById('plusBtn').onclick = (e) => { e.stopPropagation(); updateSpeed(video.playbackRate + 0.05); };
      document.querySelectorAll('.pill').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); updateSpeed(btn.dataset.val); });

      document.getElementById('volBtn').onclick = (e) => { e.stopPropagation(); video.muted = !video.muted; document.getElementById('volIcon').style.opacity = video.muted ? 0.4 : 1; };
      document.getElementById('fullBtn').onclick = (e) => { e.stopPropagation(); if (!document.fullscreenElement) playerContainer.requestFullscreen(); else document.exitFullscreen(); };
    })();
  </script>
</body>
</html>
