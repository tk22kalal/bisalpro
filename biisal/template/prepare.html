<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{file_name}} - Generate Stream</title>
    <style>
        body {
            background: white;
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .player-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .player-btn {
            background: #2c5282;
            color: white;
            border: none;
            width: 180px;
            height: 60px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .player-btn:hover { background: #1a365d; }
        .player-btn:disabled { background: #ccc; cursor: not-allowed; }

        .download-btn {
            background: #2c5282;
            color: white;
            border: none;
            width: 200px;
            height: 50px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .download-btn:hover { background: #1a365d; }
        .download-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Download manager buttons */
        .dm-buttons {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .dm-buttons.visible { display: flex; }

        @media (min-width: 480px) {
            .dm-buttons { flex-direction: row; justify-content: center; }
        }

        .dm-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: opacity 0.2s, transform 0.15s;
            white-space: nowrap;
            min-width: 110px;
            color: #fff;
        }

        .dm-btn:hover   { opacity: 0.85; transform: translateY(-1px); }
        .dm-btn:active  { transform: scale(0.97); }
        .btn-direct     { background: linear-gradient(135deg, #2c5282, #1a365d); }
        .btn-adm        { background: linear-gradient(135deg, #276749, #1c4532); }
        .btn-idm        { background: linear-gradient(135deg, #744210, #532a00); }

        .dm-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .loading {
            display: none;
            margin-top: 30px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2c5282;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #2c5282;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }

        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }

        @media (max-width: 480px) {
            .player-btn  { width: 140px; height: 55px; font-size: 14px; }
            .download-btn { width: 180px; height: 50px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-buttons">
            <button type="button" class="player-btn" id="plyrBtn"    onclick="generateStream('plyr')"    aria-label="Stream IOS/PC">IOS/PC</button>
            <button type="button" class="player-btn" id="videojsBtn" onclick="generateStream('videojs')" aria-label="Stream ANDROID">ANDROID</button>
        </div>

        <div>
            <button type="button" class="download-btn" id="downloadBtn" onclick="startDownload()" aria-label="Download">DOWNLOAD</button>
        </div>

        <!-- Three download manager buttons (shown after link is generated) -->
        <div class="dm-buttons" id="dmButtons">
            <a id="btnDirect" class="dm-btn btn-direct" href="#" download>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 20h14"/>
                </svg>
                Direct
            </a>
            <a id="btnAdm" class="dm-btn btn-adm" href="#">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 20h14"/>
                </svg>
                ADM
            </a>
            <a id="btnIdm" class="dm-btn btn-idm" href="#">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 20h14"/>
                </svg>
                IDM
            </a>
        </div>
        <p class="dm-label" id="dmLabel"></p>

        <div class="loading">
            <div class="spinner"></div>
            <p class="loading-text" id="loadingText">Generating link...</p>
        </div>

        <div class="status-message" id="statusMessage"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const linkType  = urlParams.get('type');

        window.addEventListener('DOMContentLoaded', () => {
            if (linkType === 'stream') {
                document.getElementById('downloadBtn').style.display = 'none';
            } else if (linkType === 'download') {
                document.querySelector('.player-buttons').style.display = 'none';
                startDownload();
            }
        });

        async function generateStream(playerType, retryCount = 0) {
            const buttons     = document.querySelectorAll('.player-btn, .download-btn');
            const loading     = document.querySelector('.loading');
            const statusMsg   = document.getElementById('statusMessage');
            const loadingText = document.getElementById('loadingText');

            buttons.forEach(b => b.disabled = true);
            loading.style.display = 'block';
            statusMsg.style.display = 'none';
            loadingText.textContent = `Generating ${playerType === 'plyr' ? 'IOS/PC' : 'ANDROID'} stream link...${retryCount > 0 ? ` (Retry ${retryCount}/5)` : ''}`;

            try {
                const controller = new AbortController();
                const tid = setTimeout(() => controller.abort(), 45000);
                const response = await fetch(`/api/generate/{{token}}?player=${playerType}`, {
                    signal: controller.signal,
                    headers: { 'Accept': 'application/json' }
                });
                clearTimeout(tid);

                const ct = response.headers.get('content-type') || '';
                if (!ct.includes('application/json')) throw new Error('Server returned non-JSON response. Please try again.');

                const data = await response.json();
                if (data.success) {
                    statusMsg.className = 'status-message success';
                    statusMsg.textContent = '✅ Stream link generated! Redirecting...';
                    statusMsg.style.display = 'block';
                    setTimeout(() => window.location.href = data.stream_url, 1500);
                } else {
                    throw new Error(data.error || 'Failed to generate stream link');
                }
            } catch (error) {
                const maxRetries = 5;
                const delay = Math.min(2000 * Math.pow(1.5, retryCount), 10000);
                if ((error.name === 'AbortError' || error.message.includes('JSON')) && retryCount < maxRetries) {
                    statusMsg.className = 'status-message warning';
                    statusMsg.textContent = `⏳ Retrying in ${Math.round(delay / 1000)}s... (${retryCount + 1}/${maxRetries})`;
                    statusMsg.style.display = 'block';
                    setTimeout(() => generateStream(playerType, retryCount + 1), delay);
                    return;
                }
                statusMsg.className = 'status-message error';
                statusMsg.textContent = '❌ ' + (error.name === 'AbortError' ? 'Request timed out. Please try again.' : error.message);
                statusMsg.style.display = 'block';
                buttons.forEach(b => b.disabled = false);
                loading.style.display = 'none';
            }
        }

        async function startDownload(retryCount = 0) {
            const buttons     = document.querySelectorAll('.player-btn, .download-btn');
            const loading     = document.querySelector('.loading');
            const statusMsg   = document.getElementById('statusMessage');
            const loadingText = document.getElementById('loadingText');

            buttons.forEach(b => b.disabled = true);
            loading.style.display = 'block';
            statusMsg.style.display = 'none';
            loadingText.textContent = `Generating download link...${retryCount > 0 ? ` (Retry ${retryCount}/5)` : ''}`;

            try {
                const controller = new AbortController();
                const tid = setTimeout(() => controller.abort(), 45000);
                const response = await fetch('/api/download/{{token}}', {
                    signal: controller.signal,
                    headers: { 'Accept': 'application/json' }
                });
                clearTimeout(tid);

                const ct = response.headers.get('content-type') || '';
                if (!ct.includes('application/json')) throw new Error('Server returned non-JSON response. Please try again.');

                const data = await response.json();
                if (data.success) {
                    loading.style.display = 'none';
                    statusMsg.className = 'status-message success';
                    statusMsg.textContent = '✅ Choose how to download:';
                    statusMsg.style.display = 'block';
                    buttons.forEach(b => b.disabled = false);

                    // Build intent URLs
                    const url = data.download_url;
                    const scheme  = url.startsWith('https') ? 'https' : 'http';
                    const stripped = url.replace(/^https?:\/\//, '');

                    document.getElementById('btnDirect').href = url;
                    document.getElementById('btnAdm').href    = 'intent://' + stripped + '#Intent;scheme=' + scheme + ';package=com.dv.adm;end';
                    document.getElementById('btnIdm').href    = 'intent://' + stripped + '#Intent;scheme=' + scheme + ';package=idm.internet.download.manager;end';

                    document.getElementById('dmButtons').classList.add('visible');
                    document.getElementById('dmLabel').textContent = 'ADM & IDM work on Android only';
                } else {
                    throw new Error(data.error || 'Failed to generate download link');
                }
            } catch (error) {
                const maxRetries = 5;
                const delay = Math.min(2000 * Math.pow(1.5, retryCount), 10000);
                if ((error.name === 'AbortError' || error.message.includes('JSON')) && retryCount < maxRetries) {
                    statusMsg.className = 'status-message warning';
                    statusMsg.textContent = `⏳ Retrying in ${Math.round(delay / 1000)}s... (${retryCount + 1}/${maxRetries})`;
                    statusMsg.style.display = 'block';
                    setTimeout(() => startDownload(retryCount + 1), delay);
                    return;
                }
                statusMsg.className = 'status-message error';
                statusMsg.textContent = '❌ ' + (error.name === 'AbortError' ? 'Request timed out. Please try again.' : error.message);
                statusMsg.style.display = 'block';
                buttons.forEach(b => b.disabled = false);
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
