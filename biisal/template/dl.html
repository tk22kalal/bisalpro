<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }}</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Delius">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Raleway', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        marquee {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: rgba(0,0,0,0.85);
            padding: 12px;
            font-family: 'Delius', serif;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .container {
            text-align: center;
            padding: 80px 20px 40px;
            max-width: 500px;
            width: 100%;
        }

        .file-size {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }

        .countdown-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2c5282, #1a365d);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 4px 20px rgba(44,82,130,0.4);
        }

        .countdown-number {
            font-size: 52px;
            font-weight: bold;
            color: #fff;
        }

        .countdown-text {
            font-size: 15px;
            color: #aaa;
            margin-bottom: 30px;
        }

        /* Download buttons row */
        .dl-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        @media (min-width: 480px) {
            .dl-buttons {
                flex-direction: row;
                justify-content: center;
            }
        }

        .dl-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: opacity 0.2s, transform 0.15s;
            white-space: nowrap;
            min-width: 120px;
        }

        .dl-btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .dl-btn:active { transform: scale(0.97); }

        .btn-direct {
            background: linear-gradient(135deg, #2c5282, #1a365d);
            color: #fff;
        }

        .btn-adm {
            background: linear-gradient(135deg, #276749, #1c4532);
            color: #fff;
        }

        .btn-idm {
            background: linear-gradient(135deg, #744210, #532a00);
            color: #fff;
        }

        /* Download icon SVG */
        .dl-icon {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        .status {
            margin-top: 18px;
            font-size: 13px;
            color: #48bb78;
        }
    </style>
</head>
<body>
    <marquee direction="left">{{ file_name }}</marquee>

    <div class="container">
        <p class="file-size">{{ file_size }}</p>

        <div id="countdownBlock">
            <div class="countdown-circle">
                <span class="countdown-number" id="countNum">10</span>
            </div>
            <p class="countdown-text">Download starting in <span id="countText">10</span> seconds…</p>
        </div>

        <div class="dl-buttons">
            <!-- Direct Download -->
            <a id="directBtn" class="dl-btn btn-direct" href="{{ file_url }}" download>
                <svg class="dl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 20h14"/>
                </svg>
                Direct
            </a>

            <!-- ADM Download -->
            <a id="admBtn" class="dl-btn btn-adm" href="#">
                <svg class="dl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 20h14"/>
                </svg>
                ADM
            </a>

            <!-- IDM Download -->
            <a id="idmBtn" class="dl-btn btn-idm" href="#">
                <svg class="dl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 20h14"/>
                </svg>
                IDM
            </a>
        </div>

        <p class="status" id="statusMsg"></p>
    </div>

    <script>
        const fileUrl = "{{ file_url }}";

        // Build intent URL: strip scheme, detect http vs https, prepend intent://
        function intentUrl(fileUrl, pkg) {
            const scheme  = fileUrl.startsWith('https') ? 'https' : 'http';
            const stripped = fileUrl.replace(/^https?:\/\//, '');
            return 'intent://' + stripped + '#Intent;scheme=' + scheme + ';package=' + pkg + ';end';
        }

        document.getElementById('admBtn').href = intentUrl(fileUrl, 'com.dv.adm');
        document.getElementById('idmBtn').href = intentUrl(fileUrl, 'idm.internet.download.manager');

        // Countdown → auto-trigger direct download
        let seconds = 10;
        const numEl  = document.getElementById('countNum');
        const txtEl  = document.getElementById('countText');
        const block  = document.getElementById('countdownBlock');
        const status = document.getElementById('statusMsg');

        const timer = setInterval(() => {
            seconds--;
            numEl.textContent = seconds;
            txtEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                block.style.display = 'none';
                status.textContent = '✅ Download started!';
                window.location.href = fileUrl;
            }
        }, 1000);
    </script>
</body>
</html>
