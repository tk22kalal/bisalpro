<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download - {{ file_name }}</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; user-select: none; }
        .card { background: #16213e; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; }
        .timer-circle { width: 80px; height: 80px; border: 4px solid #0f3460; border-top: 4px solid #e94560; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 20px auto; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { border-top-color: #e94560; } }
        .btn { display: none; background: #e94560; color: #fff; text-decoration: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .file-name { font-size: 14px; color: #999; margin-bottom: 20px; word-break: break-all; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="card">
        <div class="file-name">{{ file_name }}</div>
        <div id="countdown-ui">
            <div class="timer-circle" id="timer">10</div>
            <p>Processing safe link...</p>
        </div>
        <a id="dl-btn" href="{{ file_url }}" class="btn">Download Now</a>
    </div>

    <script>
        let timeLeft = 10;
        const timerEl = document.getElementById('timer');
        const ui = document.getElementById('countdown-ui');
        const btn = document.getElementById('dl-btn');

        const countdown = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                ui.style.display = 'none';
                btn.style.display = 'inline-block';
                window.location.href = "{{ file_url }}";
            }
        }, 1000);
        
        // Security: Block Inspect
        document.onkeydown = (e) => { if (e.keyCode == 123 || (e.ctrlKey && e.keyCode == 85)) return false; };
    </script>
</body>
</html>
